<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FAF6F0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>方块地产 · 联机大富翁</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23FAF6F0'/%3E%3Crect x='20' y='20' width='60' height='60' fill='%23E8935A' stroke='%234A3728' stroke-width='6'/%3E%3C/svg%3E">

<style>
  :root {
    --bg: #FAF6F0;
    --ink: #4A3728;
    --ink-soft: #8A7A6B;
    --panel: #FFFFFF;
    --panel-border: #E5DDD0;
    --accent: #E8935A;
    --accent-deep: #C9743A;
    --danger: #D9534F;
    --success: #6FB87F;
    --shadow-pixel: 3px 3px 0 var(--ink);

    --g-brown: #B8896B;
    --g-lightblue: #7EC8E3;
    --g-pink: #C9A0DC;
    --g-orange: #E8935A;
    --g-red: #D9534F;
    --g-yellow: #E8C547;
    --g-green: #6FB87F;
    --g-darkblue: #4A6FA5;

    --radius-s: 6px;
    --radius-m: 10px;
    --radius-l: 16px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
    overscroll-behavior: none;
    height: 100%;
    width: 100%;
    overflow: hidden;
  }

  /* 桌面端：#app 限制最大宽度并居中，避免在宽屏上无限拉伸导致元素比例失衡；
     手机端：屏幕本身就窄，#app 自然铺满全宽，效果跟之前一致 */
  #app {
    width: 100%;
    max-width: 720px;
    height: 100vh;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    position: relative;
    box-shadow: 0 0 0 1px var(--panel-border);
  }

  /* 桌面端（屏幕较宽时）给背景加一点呼吸感，不让内容贴边贴到浏览器边框 */
  @media (min-width: 760px) {
    body {
      display: flex;
      justify-content: center;
      background: linear-gradient(135deg, #F0E8DC, #FAF6F0);
    }
    #app {
      max-width: 760px;
      height: 100vh;
      box-shadow: 0 0 40px rgba(74, 55, 40, 0.15);
    }
  }

  .pixel-font {
    font-family: "Pixel", -apple-system, sans-serif;
    letter-spacing: 0.5px;
  }

  @font-face {
    font-family: "Pixel";
    src: local("Press Start 2P");
  }

  /* ---------- 通用按钮 ---------- */
  .btn {
    border: 3px solid var(--ink);
    border-radius: var(--radius-s);
    background: var(--panel);
    color: var(--ink);
    font-size: 15px;
    font-weight: 700;
    padding: 12px 18px;
    box-shadow: var(--shadow-pixel);
    cursor: pointer;
    transition: transform 0.08s, box-shadow 0.08s;
    -webkit-user-select: none;
    user-select: none;
  }
  .btn:active {
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 var(--ink);
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-success { background: var(--success); color: white; }
  .btn-danger { background: var(--danger); color: white; }
  .btn-block { width: 100%; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; transform: none; }

  .input {
    border: 3px solid var(--ink);
    border-radius: var(--radius-s);
    padding: 12px 14px;
    font-size: 16px;
    background: var(--panel);
    color: var(--ink);
    width: 100%;
  }
  .input:focus { outline: 3px solid var(--accent); outline-offset: 1px; }

  .card {
    background: var(--panel);
    border: 3px solid var(--ink);
    border-radius: var(--radius-m);
    box-shadow: var(--shadow-pixel);
    padding: 16px;
  }

  /* ---------- 屏幕容器 ---------- */
  .screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 20px;
    overflow-y: auto;
  }
  .screen-center {
    justify-content: center;
    align-items: center;
    text-align: center;
  }

  .logo-title {
    font-size: 28px;
    font-weight: 900;
    color: var(--accent-deep);
    margin-bottom: 4px;
  }
  .logo-sub {
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 32px;
  }

  .stack { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 320px; }
  .row { display: flex; gap: 10px; align-items: center; }
  .row-between { display: flex; justify-content: space-between; align-items: center; }

  .hidden { display: none !important; }

  /* 棋子（纯CSS绘制圆形像素棋子，非图片） */
  .token {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2.5px solid var(--ink);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 900;
    color: white;
    flex-shrink: 0;
  }
  .token-lg { width: 34px; height: 34px; font-size: 14px; }

  /* 玩家配色（与地产组色区分，走暖色系8色板） */
  :root {
    --pc-0: #E8935A;
    --pc-1: #4A6FA5;
    --pc-2: #6FB87F;
    --pc-3: #C9A0DC;
    --pc-4: #D9534F;
    --pc-5: #E8C547;
  }
  .pc-0 { background: var(--pc-0); }
  .pc-1 { background: var(--pc-1); }
  .pc-2 { background: var(--pc-2); }
  .pc-3 { background: var(--pc-3); }
  .pc-4 { background: var(--pc-4); }
  .pc-5 { background: var(--pc-5); }

  /* 顶部状态条 */
  .topbar {
    padding: 10px 16px;
    background: var(--panel);
    border-bottom: 3px solid var(--ink);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .topbar-title { font-weight: 800; font-size: 15px; }
  .conn-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); display: inline-block; margin-right: 6px; }
  .conn-dot.offline { background: var(--danger); }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: white;
    padding: 10px 18px;
    border-radius: var(--radius-s);
    font-size: 14px;
    z-index: 999;
    opacity: 0;
    transition: opacity 0.25s, transform 0.25s;
    pointer-events: none;
    max-width: 85%;
    text-align: center;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(-6px); }

  /* 加载动画 */
  .spinner {
    width: 28px; height: 28px;
    border: 4px solid var(--panel-border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---------- 游戏主界面 ---------- */
  .game-wrap {
    display: flex;
    flex-direction: column;
    padding: 10px;
    gap: 10px;
    flex: 1;
  }

  .player-strip {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 4px 2px;
  }
  .player-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--panel);
    border: 2.5px solid var(--panel-border);
    border-radius: var(--radius-s);
    padding: 6px 10px;
    flex-shrink: 0;
    opacity: 0.6;
  }
  .player-chip-active {
    border-color: var(--accent);
    opacity: 1;
    box-shadow: 2px 2px 0 var(--accent);
  }
  .player-chip-bankrupt { opacity: 0.35; filter: grayscale(1); }
  .player-chip-info { display: flex; flex-direction: column; line-height: 1.2; }
  .player-chip-name { font-size: 11px; font-weight: 700; }
  .player-chip-cash { font-size: 12px; font-weight: 800; color: var(--accent-deep); }

  /* 棋盘：11x11 网格，外圈40格+中心信息区 */
  /* 镜头跟随：外层视窗固定大小+裁切溢出，内层棋盘用transform做缩放平移跟随当前玩家位置 */
  .board-viewport {
    width: 100%;
    aspect-ratio: 1 / 1;
    max-width: 100%;
    overflow: hidden;
    position: relative;
    border-radius: var(--radius-m);
  }
  .board-area {
    width: 100%;
    height: 100%;
    position: relative; /* 棋子用绝对定位叠加在棋盘上方，独立于格子DOM做滑动动画 */
    container-type: inline-size; /* 关键：让子元素可用 cqw 单位按本容器宽度缩放，不再受限于视口绝对像素 */
    container-name: boardarea;
    transition: transform 0.5s cubic-bezier(0.34, 1.2, 0.64, 1);
    transform-origin: center center;
  }
  .board-grid {
    display: grid;
    grid-template-columns: repeat(11, 1fr);
    grid-template-rows: repeat(11, 1fr);
    width: 100%;
    height: 100%;
    border: 3px solid var(--ink);
    border-radius: var(--radius-m);
    overflow: hidden;
    background: var(--panel);
    position: relative;
  }

  .camera-reset-btn {
    position: absolute;
    bottom: 6px;
    right: 6px;
    z-index: 50;
    background: rgba(74,55,40,0.85);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 5px 9px;
    font-size: 11px;
    cursor: pointer;
  }

  /* 棋子层：绝对定位覆盖在棋盘上，用left/top的transition实现滑动跳格效果 */
  .token-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 10;
  }
  .token-moving {
    position: absolute;
    transition: left 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), top 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    transform: translate(-50%, -50%);
  }
  .token-bounce {
    animation: token-land 0.35s ease-out;
  }
  @keyframes token-land {
    0% { transform: translate(-50%, -50%) scale(1); }
    40% { transform: translate(-50%, -60%) scale(1.15); }
    100% { transform: translate(-50%, -50%) scale(1); }
  }

  .tile {
    position: relative;
    border: 1px solid var(--panel-border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    font-size: 1.7cqw;
    padding: 0.3cqw 0.2cqw;
    overflow: hidden;
    background: var(--panel);
  }
  .tile-corner {
    background: var(--bg);
    font-size: 2cqw;
    font-weight: 800;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .tile-colorbar { width: 100%; height: 1.4cqw; flex-shrink: 0; margin-bottom: 0.2cqw; }
  .tile-name {
    font-weight: 700;
    text-align: center;
    line-height: 1.05;
    word-break: break-all;
    color: var(--ink);
    position: relative;
    z-index: 2;
    text-shadow: 0 0 3px rgba(255,255,255,0.9), 0 0 3px rgba(255,255,255,0.9);
  }
  .tile-price {
    font-size: 1.5cqw;
    color: var(--ink-soft);
    margin-top: auto;
    position: relative;
    z-index: 2;
    text-shadow: 0 0 3px rgba(255,255,255,0.9);
  }
  .tile-owner-bar { width: 80%; height: 0.8cqw; border-radius: 2px; margin-top: 0.3cqw; }
  .tile-houses { font-size: 1.6cqw; margin-top: 0.2cqw; line-height: 1; position: relative; z-index: 2; }
  .tile-mortgaged { font-size: 1.3cqw; color: var(--danger); position: relative; z-index: 2; }
  .tile-tokens {
    position: absolute;
    bottom: 1px; right: 1px;
    display: flex;
    flex-wrap: wrap;
    gap: 1px;
    max-width: 90%;
    z-index: 3;
  }
  .tile-tokens .token { width: 2.4cqw; height: 2.4cqw; font-size: 1.2cqw; border-width: 1px; }

  .tile-go { background: #FFF3E0; }
  .tile-jail { background: #ECECEC; }
  .tile-freeparking { background: #F0FAF2; }
  .tile-gotojail { background: #FCEAEA; }
  .tile-tax { background: #FFF9E6; }
  .tile-card { background: #F3EEFB; }
  .tile-bank { background: #FFF8E1; }
  .tile-lottery { background: #FCE4EC; }
  .tile-station { background: #ECEFF9; }
  .tile-utility { background: #E8F5F0; }

  .tile-icon { font-size: 2.6cqw; line-height: 1; margin-bottom: 0.2cqw; position: relative; z-index: 2; }
  .tile-corner .tile-icon { font-size: 4cqw; }

  /* 填满格子的像素插画层：每个地块独立绘制的SVG背景图，铺满整格，z-index在文字之下 */
  .tile-art {
    position: absolute;
    inset: 0;
    z-index: 1;
    opacity: 0.9;
  }
  .tile-art svg { width: 100%; height: 100%; display: block; }

  /* 所有权染色：整块格子背景变为玩家主题色的淡化版本，一眼看出归属 */
  .tile-owned-bg {
    position: absolute;
    inset: 0;
    opacity: 0.38;
    z-index: 2;
  }
  .tile > * { position: relative; }
  .tile-art, .tile-owned-bg { position: absolute; }

  .board-center {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .dice-display { display: flex; gap: 10px; }
  .die {
    width: 44px; height: 44px;
    border: 3px solid var(--ink);
    border-radius: var(--radius-s);
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 900;
    box-shadow: var(--shadow-pixel);
    perspective: 200px;
  }
  .die-face {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
  }
  .die.rolling .die-face {
    animation: dice-roll 0.08s steps(1) infinite;
  }
  .die.rolling {
    animation: dice-shake 0.15s ease-in-out infinite;
  }
  @keyframes dice-roll {
    0% { transform: rotateX(0deg); }
    100% { transform: rotateX(360deg); }
  }
  @keyframes dice-shake {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    25% { transform: translate(-2px, 1px) rotate(-4deg); }
    75% { transform: translate(2px, -1px) rotate(4deg); }
  }
  .die.settled .die-face {
    animation: dice-settle 0.3s ease-out;
  }
  @keyframes dice-settle {
    0% { transform: scale(1.3) rotate(15deg); }
    60% { transform: scale(0.9) rotate(-5deg); }
    100% { transform: scale(1) rotate(0deg); }
  }

  .turn-banner {
    text-align: center;
    padding: 10px;
    border-radius: var(--radius-s);
    background: var(--panel-border);
    font-weight: 700;
    font-size: 14px;
    color: var(--ink-soft);
  }
  .turn-banner-mine {
    background: var(--accent);
    color: white;
  }

  .action-panel { min-height: 56px; }

  .log-box {
    max-height: 150px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .log-line {
    font-size: 12px;
    color: var(--ink-soft);
    padding: 2px 0;
    border-bottom: 1px dashed var(--panel-border);
  }

  /* 建房弹窗 */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(74, 55, 40, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 20px;
  }
  .modal-box {
    width: 100%;
    max-width: 360px;
    max-height: 80vh;
    overflow-y: auto;
  }
  /* 掷骰子大字播报浮层 */
  #dice-announce-overlay {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    background: rgba(74, 55, 40, 0.92);
    color: white;
    padding: 16px 28px;
    border-radius: var(--radius-l);
    font-size: 17px;
    font-weight: 800;
    text-align: center;
    z-index: 500;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s, transform 0.25s;
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    max-width: 80%;
  }
  #dice-announce-overlay.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
  #dice-announce-overlay .announce-dice {
    font-size: 26px;
    margin-top: 4px;
  }
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>
<div id="dice-announce-overlay"></div>

<script>
// ============================================================
// 方块地产 · 联机大富翁 — 前端逻辑
// 单文件 PWA，纯 JS（无框架），通过 WebSocket 连接 Cloudflare Worker 后端
// ============================================================

// ⚠️ 部署后请把下面这行换成你自己的 Worker 地址（部署说明里会教你怎么拿到）
const BACKEND_URL = "https://monopoly-game-backend.uziyom.workers.dev";
const WS_URL = BACKEND_URL.replace("https://", "wss://").replace("http://", "ws://");

// ---------- 棋盘数据（与后端 game-engine.js 完全一致，用于前端渲染，不参与判定）----------
const BOARD = [

  { id: 15, type: "station", name: "中央车站", price: 200 },
  { id: 16, type: "property", name: "集市街", group: "orange", price: 180 },
  { id: 17, type: "card", deck: "fate", name: "命运" },
  { id: 18, type: "property", name: "香料巷", group: "orange", price: 180 },
  { id: 19, type: "property", name: "集市广场", group: "orange", price: 200 },
  { id: 20, type: "freeparking", name: "自由集市" },
  { id: 21, type: "property", name: "金狮大道", group: "red", price: 220 },
  { id: 22, type: "card", deck: "chance", name: "机会" },
  { id: 23, type: "property", name: "银鹰广场", group: "red", price: 220 },
  { id: 24, type: "property", name: "王座街", group: "red", price: 240 },
  { id: 25, type: "station", name: "山地缆车", price: 200 },
  { id: 26, type: "property", name: "学院路", group: "yellow", price: 260 },
  { id: 27, type: "property", name: "钟楼街", group: "yellow", price: 260 },
  { id: 28, type: "utility", name: "电力公司", price: 150 },
  { id: 29, type: "property", name: "图书馆道", group: "yellow", price: 280 },
  { id: 30, type: "gotojail", name: "送入监狱" },
  { id: 31, type: "property", name: "松林径", group: "green", price: 300 },
  { id: 32, type: "property", name: "溪谷路", group: "green", price: 300 },
  { id: 33, type: "card", deck: "fate", name: "命运" },
  { id: 34, type: "property", name: "高地庄园", group: "green", price: 320 },
  { id: 35, type: "station", name: "灯塔渡口码头", price: 200 },
  { id: 36, type: "lottery", name: "彩票站" },
  { id: 37, type: "property", name: "摩天塔", group: "darkblue", price: 350 },
  { id: 38, type: "tax", name: "修缮税", amount: 100 },
  { id: 39, type: "property", name: "云顶天台", group: "darkblue", price: 400 },
];

const GROUP_COLOR_VAR = {
  brown: "--g-brown", lightblue: "--g-lightblue", pink: "--g-pink", orange: "--g-orange",
  red: "--g-red", yellow: "--g-yellow", green: "--g-green", darkblue: "--g-darkblue",
};

// ---------- 格子像素插画生成系统 ----------
// 每种地块类型独立设计构图，用 SVG 在 0-32 viewBox 网格上绘制，填满整个格子背景。

// ---------- 像素小人角色生成器（纯CSS/SVG绘制，无外部图片）----------
const SKIN_TONES = ["#F4C99B", "#E8A878", "#C68863", "#8D5B3F", "#F2DFC4"];
const HAIR_COLORS = ["#3A2A1E", "#6B4226", "#1A1A1A", "#A85C2A", "#D4AC4A", "#7A4A6B"];
const SHIRT_COLORS = ["#E8935A", "#4A6FA5", "#6FB87F", "#C9A0DC", "#D9534F", "#E8C547"];
const HAIR_STYLES = ["short", "long", "bun", "spiky", "bald", "curly"];

function getPlayerAppearance(player) {
  // 用 colorIndex 做稳定的"随机但确定"派生，保证同一玩家在所有客户端渲染一致
  const seed = player.colorIndex ?? 0;
  return {
    skin: SKIN_TONES[seed % SKIN_TONES.length],
    hair: HAIR_COLORS[seed % HAIR_COLORS.length],
    shirt: SHIRT_COLORS[seed % SHIRT_COLORS.length],
    hairStyle: HAIR_STYLES[seed % HAIR_STYLES.length],
  };
}

// 生成一个 32x32 像素风格小人头像的 SVG 字符串
function renderPixelAvatar(player, size = 28) {
  const { skin, hair, shirt, hairStyle } = getPlayerAppearance(player);

  let hairShape = "";
  switch (hairStyle) {
    case "short":
      hairShape = `<rect x="8" y="4" width="16" height="6" fill="${hair}"/><rect x="6" y="6" width="4" height="6" fill="${hair}"/><rect x="22" y="6" width="4" height="6" fill="${hair}"/>`;
      break;
    case "long":
      hairShape = `<rect x="7" y="4" width="18" height="6" fill="${hair}"/><rect x="6" y="8" width="4" height="14" fill="${hair}"/><rect x="22" y="8" width="4" height="14" fill="${hair}"/>`;
      break;
    case "bun":
      hairShape = `<rect x="8" y="4" width="16" height="6" fill="${hair}"/><rect x="12" y="0" width="8" height="4" fill="${hair}"/>`;
      break;
    case "spiky":
      hairShape = `<rect x="8" y="6" width="3" height="4" fill="${hair}"/><rect x="13" y="2" width="3" height="6" fill="${hair}"/><rect x="18" y="2" width="3" height="6" fill="${hair}"/><rect x="22" y="6" width="3" height="4" fill="${hair}"/><rect x="8" y="8" width="16" height="3" fill="${hair}"/>`;
      break;
    case "curly":
      hairShape = `<rect x="6" y="4" width="20" height="8" fill="${hair}"/><rect x="5" y="8" width="5" height="6" fill="${hair}"/><rect x="22" y="8" width="5" height="6" fill="${hair}"/>`;

  // 职业配饰：在头发层之上叠加，覆盖头顶/眼睛/脖子区域，让每种职业一眼可辨
  const jobBadge = renderJobBadge(player.jobId);

  return `
  <svg viewBox="0 0 32 32" width="${size}" height="${size}" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
    <rect x="9" y="9" width="14" height="14" fill="${skin}"/>

}

// ---------- 音效系统（Web Audio API 实时合成，无需任何外部音频文件）----------
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch (e) {
      return null;
    }
  }
  return audioCtx;
}

// 播放一个简单的合成音：频率序列 + 波形 + 包络
function playTone(freqs, { duration = 0.12, type = "square", gain = 0.08, gap = 0.04 } = {}) {
  if (!App.soundEnabled) return;
  const ctx = getAudioCtx();
  if (!ctx) return;
  if (ctx.state === "suspended") ctx.resume().catch(() => {});

  let t = ctx.currentTime;
  freqs.forEach((freq) => {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(gain, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.001, t + duration);
    osc.connect(g);
    g.connect(ctx.destination);
    osc.start(t);
    osc.stop(t + duration + 0.02);
    t += duration + gap;
  });
}

const SFX = {
  diceRoll: () => playTone([200, 260, 220, 300], { duration: 0.06, type: "square", gain: 0.05, gap: 0.01 }),
  diceSettle: () => playTone([440, 660], { duration: 0.1, type: "triangle", gain: 0.1, gap: 0.02 }),
  buy: () => playTone([523, 659, 784], { duration: 0.09, type: "sine", gain: 0.09, gap: 0.02 }),
  payRent: () => playTone([300, 240], { duration: 0.12, type: "sawtooth", gain: 0.07, gap: 0.01 }),
  bankrupt: () => playTone([400, 300, 200, 100], { duration: 0.18, type: "sawtooth", gain: 0.09, gap: 0.02 }),
  win: () => playTone([523, 659, 784, 1046], { duration: 0.16, type: "triangle", gain: 0.12, gap: 0.03 }),

// 根据日志文本内容推断该播放哪个音效（轻量启发式，不需要服务器额外传事件类型）
function inferSfxFromLogText(text) {
  if (text.includes("破产")) return SFX.bankrupt;
  if (text.includes("获胜")) return SFX.win;
  if (text.includes("开标") || text.includes("中奖") || text.includes("开奖") && text.includes("🎉")) return SFX.jackpot;
  if (text.includes("购买了")) return SFX.buy;
  if (text.includes("支付租金") || text.includes("缴纳")) return SFX.payRent;
  return null;
}

// 扫描新增日志，播放对应音效（在每次state更新后调用）
function playSfxForNewLogs(state) {
  if (!state || !state.log) return;
  const newLogs = state.log.slice(App.lastSeenLogIndex);
  newLogs.forEach((l) => {
    const sfx = inferSfxFromLogText(l.text);
    if (sfx) sfx();
  });
  App.lastSeenLogIndex = state.log.length;
}

// ---------- 工具函数 ----------
function $(sel) { return document.querySelector(sel); }
function el(tag, props = {}, children = []) {
  const node = document.createElement(tag);
  Object.entries(props).forEach(([k, v]) => {
    if (k === "class") node.className = v;
    else if (k === "html") node.innerHTML = v;
    else if (k.startsWith("on") && typeof v === "function") node.addEventListener(k.slice(2), v);
    else node.setAttribute(k, v);
  });
  (Array.isArray(children) ? children : [children]).forEach((c) => {
    if (c == null) return;
    node.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  });
  return node;
}

function showToast(msg, duration = 2400) {
  const t = $("#toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove("show"), duration);
}

function showDiceAnnounce(announce) {
  const overlay = $("#dice-announce-overlay");
  if (!overlay || !announce) return;
  const [d1, d2] = announce.dice;
  const toTile = announce.toPos != null ? BOARD[announce.toPos] : null;

  overlay.innerHTML = "";
  overlay.appendChild(el("div", {}, `${announce.playerName} 掷出了`));
  overlay.appendChild(el("div", { class: "announce-dice" }, `🎲 ${d1} + ${d2} = ${d1 + d2}`));
  if (toTile) {
    overlay.appendChild(el("div", { style: "font-size:13px; font-weight:400; margin-top:4px; opacity:0.85;" }, `来到了 ${toTile.name}`));
  }

  overlay.classList.add("show");
  clearTimeout(overlay._timer);
  overlay._timer = setTimeout(() => overlay.classList.remove("show"), 2000);
}

// ---------- 自动托管：开启后，轮到自己时按简单策略自动操作，用于暂时离开不耽误其他人 ----------
function maybeAutoPilot(state) {
  if (!App.autoPilot) return;
  if (!state || state.phase !== "playing") return;
  const cp = state.players[state.currentPlayerIndex];
  if (!cp || cp.id !== App.playerId) return;
  const me = cp;
  if (me.bankrupt) return;

  // 稍微延迟一下再操作，模拟"思考"，也给UI一点时间渲染当前状态，避免操作过快显得突兀
  setTimeout(() => {
    if (!App.autoPilot) return; // 延迟期间可能被取消
    const s = App.gameState;
    if (!s || s.phase !== "playing") return;
    const curr = s.players[s.currentPlayerIndex];
    if (!curr || curr.id !== App.playerId) return;

    const phase = s.turnSubPhase;
    if (phase === "rolling") {
      sendAction("rollDice");
    } else if (phase === "awaitingBuy") {
      // 策略：现金大于400才买，避免托管期间因买地花光现金
      sendAction("buyProperty", { buy: curr.cash > 400 });
    } else if (phase === "awaitingBank") {
      sendAction("bankLeave"); // 托管默认不主动理财，避免误操作产生贷款
    } else if (phase === "awaitingLottery") {
      sendAction("lotterySkip");
    } else if (phase === "awaitingGamble") {
      sendAction("gambleChoice", { wantsGamble: false }); // 托管默认稳妥交租，不赌
    } else if (phase === "awaitingBagBid") {
      sendAction("bagBidSkip");
    }
  }, 600);
}

function getOrCreatePlayerId() {
  let pid = localStorage.getItem("monopoly_player_id");
  if (!pid) {
    pid = "p_" + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
    localStorage.setItem("monopoly_player_id", pid);
  }
  return pid;
}

function saveSession(roomId, name) {
  localStorage.setItem("monopoly_room_id", roomId);
  localStorage.setItem("monopoly_player_name", name);
}
function clearSession() {
  localStorage.removeItem("monopoly_room_id");
}

// ---------- WebSocket 连接管理 ----------
function connectToRoom(roomId, playerName) {
  if (App.ws) {
    try { App.ws.close(); } catch (e) {}
  }
  App.roomId = roomId;
  App.playerName = playerName;
  App.playerId = getOrCreatePlayerId();

  const url = `${WS_URL}/ws/${roomId}?playerId=${encodeURIComponent(App.playerId)}&name=${encodeURIComponent(playerName)}`;
  const ws = new WebSocket(url);
  App.ws = ws;

  ws.addEventListener("open", () => {
    App.connected = true;
    App.reconnectAttempts = 0;
    updateConnDot();
  });

  ws.addEventListener("message", (event) => {
    let msg;
    try { msg = JSON.parse(event.data); } catch (e) { return; }

    if (msg.type === "welcome") {
      App.playerId = msg.playerId;
      App.gameState = msg.state;
      App.lastSeenLogIndex = msg.state.log ? msg.state.log.length : 0; // 初始连接不补放历史音效
      saveSession(roomId, playerName);
      App.screen = "room";
      render();
    } else if (msg.type === "state") {
      const prevPhase = App.gameState?.phase;
      const prevChatLen = App.gameState?.chat?.length || 0;
      const prevDiceAnnounce = App.gameState?.lastDiceAnnounce;
      App.gameState = msg.state;

      playSfxForNewLogs(msg.state);
      if ((msg.state.chat?.length || 0) > prevChatLen) {
        SFX.chat();
      }
      // 检测新的骰子播报，触发大字浮层
      if (msg.state.lastDiceAnnounce && msg.state.lastDiceAnnounce !== prevDiceAnnounce) {
        showDiceAnnounce(msg.state.lastDiceAnnounce);
      }

      if (App.screen !== "room") { App.screen = "room"; }
      render();
      if (prevPhase === "waiting" && msg.state.phase === "playing") {
        showToast("游戏开始！");
      }
      // 自动托管：轮到自己且开启了托管时，按简单策略自动操作
      maybeAutoPilot(msg.state);
    } else if (msg.type === "error") {
      showToast(msg.message);
      SFX.error();
    }
  });

  ws.addEventListener("close", () => {
    App.connected = false;
    updateConnDot();
    scheduleReconnect();
  });

  ws.addEventListener("error", () => {
    App.connected = false;
    updateConnDot();
  });
}

function scheduleReconnect() {
  if (App.reconnectTimer) return;
  if (!App.roomId) return;
  App.reconnectAttempts += 1;
  const delay = Math.min(1000 * App.reconnectAttempts, 8000);
  App.reconnectTimer = setTimeout(() => {
    App.reconnectTimer = null;
    if (App.roomId && App.screen === "room") {
      connectToRoom(App.roomId, App.playerName);
    }
  }, delay);
}

function sendAction(type, payload = {}) {
  if (!App.ws || App.ws.readyState !== WebSocket.OPEN) {
    showToast("连接已断开，正在重连…");
    return;
  }
  App.ws.send(JSON.stringify({ type, ...payload }));
}

// 掷骰子专用：先本地播放"滚动"动画再发请求，服务器结果回来后骰子自然"定格"在新数字上
function rollDiceWithAnimation() {
  const diceEls = document.querySelectorAll("#dice-display .die");
  diceEls.forEach((d) => d.classList.add("rolling"));
  // 短暂延迟后才真正发请求，让滚动动画有时间播放，体验更像真的在掷骰子
  setTimeout(() => {
    sendAction("rollDice");
  }, 500);
}

function updateConnDot() {
  const dot = document.querySelector(".conn-dot");
  if (dot) dot.classList.toggle("offline", !App.connected);
}

// 心跳：防止部分网络环境下空闲连接被中间设备掐断
setInterval(() => {
  if (App.ws && App.ws.readyState === WebSocket.OPEN) {
    sendAction("ping");
  }
}, 25000);

  const resp = await fetch(`${BACKEND_URL}/api/create-room`, { method: "POST" });
  if (!resp.ok) throw new Error("创建房间失败");
  const data = await resp.json();

  return resp.json();
}

// ---------- 棋盘渲染：40格矩形外圈布局 ----------
// 布局规则：底边 0-10（从右到左），左边 10-20（从下到上），顶边 20-30（从左到右），右边 30-0（从上到下）
function getTileGridPosition(tileId) {
  // 使用 11x11 网格，四角是角格，四边各9个非角格
  if (tileId <= 10) return { col: 10 - tileId, row: 10 };          // 底边，从右到左
  if (tileId <= 20) return { col: 0, row: 10 - (tileId - 10) };     // 左边，从下到上
  if (tileId <= 30) return { col: tileId - 20, row: 0 };            // 顶边，从左到右
  return { col: 10, row: tileId - 30 };                              // 右边，从上到下
}

// 格子中心点的百分比坐标（11x11网格，每格约9.0909%），用于棋子绝对定位
function getTileCenterPercent(tileId) {
  const { col, row } = getTileGridPosition(tileId);
  return {
    leftPct: ((col + 0.5) / 11) * 100,
    topPct: ((row + 0.5) / 11) * 100,
  };
}

function renderBoard(state) {
  const wrapper = el("div", { class: "board-grid" });
  const propStates = state.properties;

  BOARD.forEach((tile) => {
    const { col, row } = getTileGridPosition(tile.id);
    const isCorner = [0, 10, 20, 30].includes(tile.id);
    const pState = propStates[tile.id];
    const owner = pState && pState.ownerId ? state.players.find((p) => p.id === pState.ownerId) : null;

    const cell = el("div", {
      class: `tile ${isCorner ? "tile-corner" : ""} tile-${tile.type}`,
      style: `grid-column:${col + 1}; grid-row:${row + 1};`,
    });

    // 填满格子的像素插画层（每种地块类型独立设计构图）
    const artLayer = el("div", { class: "tile-art" });
    artLayer.innerHTML = renderTileArt(tile);
    cell.appendChild(artLayer);

    // 所有权整块染色背景（半透明叠层，在插画之上、文字之下，一眼看出"这块是谁的"）
    if (owner) {
      cell.appendChild(el("div", { class: `tile-owned-bg pc-${owner.colorIndex % 6}` }));
    }

    if (tile.group && !isCorner) {
      cell.appendChild(el("div", { class: "tile-colorbar", style: `background:var(${GROUP_COLOR_VAR[tile.group]})` }));
    }

    cell.appendChild(el("div", { class: "tile-name" }, tile.name));

    if (tile.type === "property" || tile.type === "station" || tile.type === "utility") {
      cell.appendChild(el("div", { class: "tile-price" }, owner ? "" : `$${tile.price}`));
      if (pState && pState.houses > 0) {
        cell.appendChild(el("div", { class: "tile-houses" }, pState.houses === 5 ? "🏨" : "🏠".repeat(pState.houses)));
      }
      if (pState && pState.mortgaged) {
        cell.appendChild(el("div", { class: "tile-mortgaged" }, "已抵押"));
      }
    }

    wrapper.appendChild(cell);
  });

  // 中心区域：骰子展示 + 回合数 + 彩票奖池信息
  const center = el("div", { class: "board-center", style: "grid-column:2/11; grid-row:2/11;" });
  const centerInner = el("div", { style: "display:flex; flex-direction:column; align-items:center; gap:8px;" });

  const diceWrap = el("div", { class: "dice-display", id: "dice-display" });
  diceWrap.appendChild(makeDieEl(state.dice[0]));
  diceWrap.appendChild(makeDieEl(state.dice[1]));
  centerInner.appendChild(diceWrap);

  if (state.lottery && state.lottery.pool > 0) {
    centerInner.appendChild(el("div", { style: "font-size:11px; color:var(--ink-soft); background:white; padding:3px 8px; border-radius:8px; border:1.5px solid var(--panel-border);" }, `🎟️ 彩票奖池 $${state.lottery.pool}`));
  }

  center.appendChild(centerInner);
  wrapper.appendChild(center);

  // 棋子层：独立绝对定位，叠加在 board-area 上（不在 board-grid 内部），用于平滑滑动动画
  const boardArea = el("div", { class: "board-area", id: "board-area-inner" }, [wrapper]);
  const tokenLayer = el("div", { class: "token-layer", id: "token-layer" });
  boardArea.appendChild(tokenLayer);

  renderTokens(state, tokenLayer);

  // 镜头视窗：固定大小+裁切溢出，内部 board-area 用 transform 实现缩放平移跟随
  const viewport = el("div", { class: "board-viewport" }, [boardArea]);

  const resetBtn = el("button", { class: "camera-reset-btn" }, "🗺️ 回到全局视图");
  resetBtn.addEventListener("click", () => {
    Camera.locked = false;
    applyCameraTransform();
  });
  viewport.appendChild(resetBtn);

  // 应用当前镜头状态（首次渲染时立即对齐，避免出现一帧默认视角再跳转的闪烁）
  setTimeout(() => applyCameraTransform(), 0);

  return viewport;
}

// ---------- 镜头跟随系统 ----------
const Camera = {
  locked: true, // true: 自动跟随当前回合玩家；false: 用户手动切到全局视图
};

function applyCameraTransform() {
  const boardAreaInner = document.getElementById("board-area-inner");
  if (!boardAreaInner || !App.gameState) return;
  const state = App.gameState;

  if (!Camera.locked || state.phase !== "playing") {
    boardAreaInner.style.transform = "scale(1) translate(0, 0)";
    return;
  }

  const cp = state.players[state.currentPlayerIndex];
  if (!cp) {
    boardAreaInner.style.transform = "scale(1) translate(0, 0)";
    return;
  }

  const { leftPct, topPct } = getTileCenterPercent(cp.position);
  const scale = 1.8;
  // 把目标格子的中心点平移到视窗中心：偏移量 = (50% - 目标点百分比) 按缩放比例放大
  const translateX = (50 - leftPct) * (scale / 100) * 100;
  const translateY = (50 - topPct) * (scale / 100) * 100;
  boardAreaInner.style.transform = `scale(${scale}) translate(${translateX}%, ${translateY}%)`;
}

function makeDieEl(value) {
  const die = el("div", { class: value > 0 ? "die settled" : "die" }, [
    el("div", { class: "die-face" }, value > 0 ? String(value) : "?"),
  ]);
  return die;
}

// 棋子渲染：同格多个玩家时，按小圆环方式错开排布，避免完全重叠
function renderTokens(state, layer) {
  const tilePlayers = {}; // tileId -> [players]
  state.players.forEach((p) => {
    if (p.bankrupt) return;
    tilePlayers[p.position] = tilePlayers[p.position] || [];
    tilePlayers[p.position].push(p);
  });

  Object.entries(tilePlayers).forEach(([tileId, players]) => {
    const { leftPct, topPct } = getTileCenterPercent(Number(tileId));
    const n = players.length;
    players.forEach((p, idx) => {
      // 多人同格时，围绕格子中心做小幅度偏移，避免完全重叠看不清
      const offsetAngle = (idx / Math.max(n, 1)) * 2 * Math.PI;
      const offsetRadius = n > 1 ? 2.2 : 0;
      const left = leftPct + Math.cos(offsetAngle) * offsetRadius;
      const top = topPct + Math.sin(offsetAngle) * offsetRadius;

      const existing = document.getElementById(`token-${p.id}`);
      const tokenEl = el("div", {
        id: `token-${p.id}`,
        class: "token-moving",
        style: `left:${left}%; top:${top}%; width:22px; height:22px;`,
        title: p.name,
      });
      tokenEl.innerHTML = renderPixelAvatar(p, 22);
      tokenEl.style.border = "2px solid var(--ink)";
      tokenEl.style.borderRadius = "50%";
      tokenEl.style.overflow = "hidden";
      tokenEl.style.background = "white";
      tokenEl.style.boxShadow = "1px 1px 0 var(--ink)";
      layer.appendChild(tokenEl);
    });
  });
}

function buildActionPanel(state) {
  const me = state.players.find((p) => p.id === App.playerId);

    }

    const row = el("div", { class: "row" });
    row.appendChild(el("button", { class: "btn btn-success", style: "flex:1;", onclick: () => sendAction("buyProperty", { buy: true }) }, "购买"));
    row.appendChild(el("button", { class: "btn btn-danger", style: "flex:1;", onclick: () => sendAction("buyProperty", { buy: false }) }, "放弃"));
    panel.appendChild(row);
  } else if (state.turnSubPhase === "awaitingBank" && state.pendingDecision) {
    panel.appendChild(buildBankPanel(me));
  } else if (state.turnSubPhase === "awaitingLottery" && state.pendingDecision) {
    panel.appendChild(buildLotteryPanel(me));
  } else if (state.turnSubPhase === "awaitingGamble" && state.pendingDecision) {
    panel.appendChild(buildGamblePanel(state, me));
  } else if (state.turnSubPhase === "awaitingBagBid" && state.pendingDecision) {
    panel.appendChild(buildBagBidPanel(state, me));
  }

  const buildableTiles = BOARD.filter((t) => t.type === "property" && state.properties[t.id]?.ownerId === App.playerId);

  }

  return panel;
}

function buildLogBox(state) {
  const logBox = el("div", { class: "log-box" });
  state.log.slice(-12).reverse().forEach((l) => {
    const timeStr = formatTimeHHMMSS(l.ts);
    logBox.appendChild(el("div", { class: "log-line" }, [
      el("span", { style: "color:var(--ink-soft); font-size:10px; margin-right:6px;" }, timeStr),
      l.text,
    ]));
  });
  return logBox;
}

function formatTimeHHMMSS(ts) {
  if (!ts) return "";
  const d = new Date(ts);
  const pad = (n) => String(n).padStart(2, "0");
  return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

function buildChatPanel(state) {
  const chatWrap = el("div", {});
  const chatBox = el("div", { class: "log-box", id: "chat-box", style: "max-height:150px;" });
  (state.chat || []).slice(-30).forEach((c) => {
    const isMine = c.playerId === App.playerId;
    chatBox.appendChild(el("div", {
      class: "log-line",
      style: isMine ? "color:var(--accent-deep); font-weight:600;" : "",
    }, [
      el("span", { style: "color:var(--ink-soft); font-size:10px; margin-right:6px;" }, formatTimeHHMMSS(c.ts)),

    chatBox.appendChild(el("div", { style: "color:var(--ink-soft); text-align:center; padding:10px 0;" }, "还没有人说话，打个招呼吧"));
  }

  const inputRow = el("div", { class: "row", style: "margin-top:8px;" });
  const input = el("input", { class: "input", placeholder: "说点什么…", maxlength: "200", style: "flex:1;" });
  const sendBtn = el("button", { class: "btn btn-primary", style: "white-space:nowrap;" }, "发送");
  const doSend = () => {
    const text = input.value.trim();
    if (!text) return;
    sendAction("sendChat", { text });
    input.value = "";

function openBuildModal(state) {
  const me = state.players.find((p) => p.id === App.playerId);
  const isArchitect = me && me.jobId === "architect";
  const myTiles = BOARD.filter((t) => t.type === "property" && state.properties[t.id]?.ownerId === App.playerId);

  const overlay = el("div", { class: "modal-overlay", onclick: (e) => { if (e.target === overlay) overlay.remove(); } });
  const modal = el("div", { class: "modal-box card" });
  modal.appendChild(el("div", { style: "font-weight:800; margin-bottom:4px;" }, "建房"));
  modal.appendChild(el("div", { style: "font-size:12px; color:var(--ink-soft); margin-bottom:12px;" }, "拥有地产即可建房，无需集齐整组；建房后需保留至少 $500 现金"));

  if (myTiles.length === 0) {
    modal.appendChild(el("div", { style: "text-align:center; color:var(--ink-soft); padding:20px 0;" }, "你还没有可建房的地产"));
  }

  myTiles.forEach((tile) => {
    const pState = state.properties[tile.id];
    const baseCost = tile.houseCost || 50;
    const cost = isArchitect ? Math.floor(baseCost * 0.8) : baseCost;
    const costLabel = isArchitect ? `$${cost}（建筑师折扣，原价$${baseCost}）` : `$${cost}`;
    const canAfford = me.cash - cost >= 500;
    const isFull = pState.houses >= 5;

    const row = el("div", { class: "row-between", style: "padding:8px 0; border-bottom:2px solid var(--panel-border);" }, [
      el("div", {}, [
        el("div", { style: "font-weight:700;" }, tile.name),
        el("div", { style: "font-size:12px; color:var(--ink-soft);" }, `房屋: ${pState.houses}/5  造价: ${costLabel}`),
        !canAfford && !isFull ? el("div", { style: "font-size:11px; color:var(--danger);" }, "现金不足安全垫，无法建造") : null,
      ]),
      el("button", {
        class: "btn btn-primary",
        style: "padding:8px 14px; font-size:13px;",
        onclick: () => { sendAction("buildHouse", { tileId: tile.id }); overlay.remove(); },
      }, "+建造"),
    ]);

      row.querySelector("button").disabled = true;
    }
    modal.appendChild(row);
  });

  modal.appendChild(el("button", { class: "btn btn-block", style: "margin-top:14px;", onclick: () => overlay.remove() }, "关闭"));
  overlay.appendChild(modal);

}

// ---------- 主渲染调度 ----------
function render() {
  const app = $("#app");

  // 游戏进行中：复用已存在的棋盘容器，只做增量更新，保证棋子滑动动画生效
  if (App.screen === "room" && App.gameState && App.gameState.phase === "playing") {
    const existingBoardArea = document.getElementById("board-area-root");
    if (existingBoardArea) {
      updateGamePlayingIncremental();
      return;
    }
  }

  app.innerHTML = "";

  if (App.screen === "room" && App.gameState) {
    const autoPilotBtn = App.gameState.phase === "playing" ? el("button", {
      class: "btn" + (App.autoPilot ? " btn-primary" : ""),
      style: "padding:6px 9px; font-size:11px;",
    }, App.autoPilot ? "🤖 托管中" : "🤖 托管") : null;
    if (autoPilotBtn) {
      autoPilotBtn.addEventListener("click", () => {
        App.autoPilot = !App.autoPilot;
        autoPilotBtn.classList.toggle("btn-primary", App.autoPilot);
        autoPilotBtn.textContent = App.autoPilot ? "🤖 托管中" : "🤖 托管";
        showToast(App.autoPilot ? "已开启自动托管" : "已关闭自动托管");
        if (App.autoPilot) maybeAutoPilot(App.gameState); // 开启时立刻检查一次，避免错过当前回合
      });
    }

    const soundBtn = el("button", {
      class: "btn",
      style: "padding:6px 9px; font-size:11px;",
    }, App.soundEnabled ? "🔊" : "🔇");
    soundBtn.addEventListener("click", () => {
      App.soundEnabled = !App.soundEnabled;
      soundBtn.textContent = App.soundEnabled ? "🔊" : "🔇";
    });

    const top = el("div", { class: "topbar" }, [
      el("div", { class: "topbar-title" }, [
        el("span", { class: "conn-dot" + (App.connected ? "" : " offline") }),
        `房间 ${App.roomId}`,
      ]),
      el("div", { class: "row", style: "gap:6px;" }, [
        autoPilotBtn,
        soundBtn,
        el("button", { class: "btn", style: "padding:6px 10px; font-size:12px;", onclick: () => {
          if (confirm("确定退出房间吗？退出后可凭房间号重新加入。")) {
            clearSession();
            App.roomId = null;
            if (App.ws) App.ws.close();
            App.screen = "home";
            render();
          }
        }}, "退出"),
      ]),
    ]);
    app.appendChild(top);

    const body = el("div", { style: "flex:1; overflow-y:auto; display:flex; flex-direction:column;" });
    app.appendChild(body);

    if (App.gameState.phase === "waiting") {
      renderWaitingRoom(body);
    } else if (App.gameState.phase === "playing") {
      renderGamePlaying(body);
    } else if (App.gameState.phase === "ended") {
      renderGameEnded(body);
    }
    return;
  }

  if (App.screen === "create") return renderCreate(app);
  if (App.screen === "join") return renderJoin(app);
  renderHome(app);
}

// 游戏进行中的增量更新：只替换玩家条/操作面板/日志，棋盘格子整体刷新（变化不频繁），
// 但棋子层做"移动现有元素"而非"重建"，从而让 CSS transition 动画生效
function updateGamePlayingIncremental() {
  const state = App.gameState;

  // 1. 更新棋盘格子内容（所有权染色、房屋数等）—— 格子本身重建不影响棋子动画，因为棋子在独立层
  const oldBoardGrid = document.querySelector("#board-area-root .board-grid");
  if (oldBoardGrid) {
    const newBoardArea = renderBoard(state);
    const newGrid = newBoardArea.querySelector(".board-grid");
    oldBoardGrid.replaceWith(newGrid);
  }

  // 2. 棋子层：增量移动已存在的棋子元素到新位置（触发transition），新玩家则新建
  const tokenLayer = document.getElementById("token-layer");
  if (tokenLayer) {
    updateTokenPositions(state, tokenLayer);
  }

  // 3. 顶部玩家资产条、操作面板、日志：直接重建（变化频繁但本身不需要动画）
  const playerStripOld = document.querySelector(".player-strip");
  if (playerStripOld) {
    const newStrip = buildPlayerStrip(state);
    playerStripOld.replaceWith(newStrip);
  }

  const turnBannerOld = document.querySelector(".turn-banner");
  if (turnBannerOld) {
    const newBanner = buildTurnBanner(state);
    turnBannerOld.replaceWith(newBanner);
  }

  const actionPanelOld = document.querySelector(".action-panel");
  if (actionPanelOld) {
    const newPanel = buildActionPanel(state);
    actionPanelOld.replaceWith(newPanel);
  }

  const logChatOld = document.querySelector(".log-chat-panel");
  if (logChatOld) {
    // 保留聊天输入框当前内容和焦点，避免别人操作触发的广播打断正在打字的玩家
    const oldInput = logChatOld.querySelector("input.input");
    const hadFocus = oldInput && document.activeElement === oldInput;
    const oldValue = oldInput ? oldInput.value : "";

    const newPanel = buildLogChatPanel(state);
    logChatOld.replaceWith(newPanel);

    if (oldValue) {
      const newInput = newPanel.querySelector("input.input");
      if (newInput) {
        newInput.value = oldValue;
        if (hadFocus) newInput.focus();
      }
    }
  }

  // 5. 镜头跟随：棋盘格子内容刚被替换（第1步），此时再应用一次镜头变换，确保位置更新后镜头跟着对齐
  applyCameraTransform();
}

// 增量移动棋子：已存在的token元素只更新left/top（触发CSS transition滑动），不存在则新建
function updateTokenPositions(state, layer) {
  const alivePlayers = state.players.filter((p) => !p.bankrupt);
  const tilePlayers = {};
  alivePlayers.forEach((p) => {
    tilePlayers[p.position] = tilePlayers[p.position] || [];
    tilePlayers[p.position].push(p);
  });

  const seenIds = new Set();

  Object.entries(tilePlayers).forEach(([tileId, players]) => {
    const { leftPct, topPct } = getTileCenterPercent(Number(tileId));
    const n = players.length;
    players.forEach((p, idx) => {
      seenIds.add(p.id);
      const offsetAngle = (idx / Math.max(n, 1)) * 2 * Math.PI;
      const offsetRadius = n > 1 ? 2.2 : 0;
      const left = leftPct + Math.cos(offsetAngle) * offsetRadius;
      const top = topPct + Math.sin(offsetAngle) * offsetRadius;

      let tokenEl = document.getElementById(`token-${p.id}`);
      if (tokenEl) {
        // 已存在：只改变位置触发 transition 动画
        const movedDistance = Math.abs(parseFloat(tokenEl.style.left) - left) + Math.abs(parseFloat(tokenEl.style.top) - top);
        tokenEl.style.left = `${left}%`;
        tokenEl.style.top = `${top}%`;
        if (movedDistance > 0.5) {
          tokenEl.classList.remove("token-bounce");
          // 触发重排后再加class，确保动画能重新播放
          requestAnimationFrame(() => tokenEl.classList.add("token-bounce"));
        }
      } else {
        // 新建（首次出现，如刚加入游戏）
        tokenEl = el("div", {
          id: `token-${p.id}`,
          class: "token-moving",
          style: `left:${left}%; top:${top}%; width:22px; height:22px;`,
          title: p.name,
        });
        tokenEl.innerHTML = renderPixelAvatar(p, 22);
        tokenEl.style.border = "2px solid var(--ink)";
        tokenEl.style.borderRadius = "50%";
        tokenEl.style.overflow = "hidden";
        tokenEl.style.background = "white";
        tokenEl.style.boxShadow = "1px 1px 0 var(--ink)";
        layer.appendChild(tokenEl);
      }
    });
  });

  // 清理已破产/已离场玩家的棋子元素
  layer.querySelectorAll(".token-moving").forEach((el) => {
    const pid = el.id.replace("token-", "");
    if (!seenIds.has(pid)) el.remove();
  });
}

// ---------- 初始化 ----------
function init() {
  // 处理分享链接中的房间号参数
  const urlParams = new URLSearchParams(location.search);
  const roomFromUrl = urlParams.get("room");

  if (roomFromUrl) {
    App.screen = "join";
    render();
    setTimeout(() => {
      const roomInput = document.querySelector('input[placeholder="房间号（4位）"]');
      if (roomInput) roomInput.value = roomFromUrl.toUpperCase();
    }, 0);
    return;
  }

  render();

  // 注册 Service Worker（独立 sw.js 文件，与本页面同源部署；详见部署说明）
  // 注：浏览器禁止用 Blob/跨域 URL 注册 Service Worker，必须是同源的真实文件，
  // 所以本项目附带一个独立的 sw.js，部署时把它和 index.html 放在同一目录即可。
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js").catch(() => {
      // 找不到 sw.js 不影响游戏功能，只是没有离线外壳缓存
    });
  }
}

init();

</script>
