<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FAF6F0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>方块地产 · 联机大富翁</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23FAF6F0'/%3E%3Crect x='20' y='20' width='60' height='60' fill='%23E8935A' stroke='%234A3728' stroke-width='6'/%3E%3C/svg%3E">

<style>
  :root {
    --bg: #FAF6F0;
    --ink: #4A3728;
    --ink-soft: #8A7A6B;
    --panel: #FFFFFF;
    --panel-border: #E5DDD0;
    --accent: #E8935A;
    --accent-deep: #C9743A;
    --danger: #D9534F;
    --success: #6FB87F;
    --shadow-pixel: 3px 3px 0 var(--ink);

    --g-brown: #B8896B;
    --g-lightblue: #7EC8E3;
    --g-pink: #C9A0DC;
    --g-orange: #E8935A;
    --g-red: #D9534F;
    --g-yellow: #E8C547;
    --g-green: #6FB87F;
    --g-darkblue: #4A6FA5;

    --radius-s: 6px;
    --radius-m: 10px;
    --radius-l: 16px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
    overscroll-behavior: none;
    height: 100%;
    width: 100%;
    overflow: hidden;
  }

  /* 桌面端：#app 限制最大宽度并居中，避免在宽屏上无限拉伸导致元素比例失衡；
     手机端：屏幕本身就窄，#app 自然铺满全宽，效果跟之前一致 */
  #app {
    width: 100%;
    max-width: 720px;
    height: 100vh;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    position: relative;
    box-shadow: 0 0 0 1px var(--panel-border);
  }

  /* 桌面端（屏幕较宽时）给背景加一点呼吸感，不让内容贴边贴到浏览器边框；
     同时把可用宽度大幅提升（720px -> 1100px），避免之前"窗口很宽但内容区域死板限宽760px导致
     大片空白、动态/聊天框看起来没有铺满"的问题。1100px 这个上限本身仍然是为了避免在
     27寸等超宽屏上棋盘格子被拉伸得过于巨大、比例失衡。 */
  @media (min-width: 760px) {
    body {
      display: flex;
      justify-content: center;
      background: linear-gradient(135deg, #F0E8DC, #FAF6F0);
    }
    #app {
      max-width: 1100px;
      height: 100vh;
      box-shadow: 0 0 40px rgba(74, 55, 40, 0.15);
    }
  }

  .pixel-font {
    font-family: "Pixel", -apple-system, sans-serif;
    letter-spacing: 0.5px;
  }

  @font-face {
    font-family: "Pixel";
    src: local("Press Start 2P");
  }

  /* ---------- 通用按钮 ---------- */
  .btn {
    border: 3px solid var(--ink);
    border-radius: var(--radius-s);
    background: var(--panel);
    color: var(--ink);
    font-size: 15px;
    font-weight: 700;
    padding: 12px 18px;
    box-shadow: var(--shadow-pixel);
    cursor: pointer;
    transition: transform 0.08s, box-shadow 0.08s;
    -webkit-user-select: none;
    user-select: none;
  }
  .btn:active {
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 var(--ink);
  }
  .btn-primary { background: var(--accent); color: white; }

  /* 选职业盒子的三种状态：默认/我选中的/被别人占用的 */
  .job-box { transition: transform 0.15s; }
  .job-box:not(:disabled):active { transform: scale(0.92); }
  .job-box-mine { background: var(--success); border-color: #3D7A4A; }
  .job-box-taken { background: var(--panel-border); opacity: 0.5; }
  .btn-success { background: var(--success); color: white; }
  .btn-danger { background: var(--danger); color: white; }
  .btn-block { width: 100%; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; transform: none; }

  .input {
    border: 3px solid var(--ink);
    border-radius: var(--radius-s);
    padding: 12px 14px;
    font-size: 16px;
    background: var(--panel);
    color: var(--ink);
    width: 100%;
  }
  .input:focus { outline: 3px solid var(--accent); outline-offset: 1px; }

  .card {
    background: var(--panel);
    border: 3px solid var(--ink);
    border-radius: var(--radius-m);
    box-shadow: var(--shadow-pixel);
    padding: 16px;
  }

  /* ---------- 屏幕容器 ---------- */
  .screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 20px;
    overflow-y: auto;
  }
  .screen-center {
    justify-content: center;
    align-items: center;
    text-align: center;
  }

  .logo-title {
    font-size: 28px;
    font-weight: 900;
    color: var(--accent-deep);
    margin-bottom: 4px;
  }
  .logo-sub {
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 32px;
  }

  .stack { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 320px; }
  .row { display: flex; gap: 10px; align-items: center; }
  .row-between { display: flex; justify-content: space-between; align-items: center; }

  .hidden { display: none !important; }

  /* 棋子（纯CSS绘制圆形像素棋子，非图片） */
  .token {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2.5px solid var(--ink);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 900;
    color: white;
    flex-shrink: 0;
  }
  .token-lg { width: 34px; height: 34px; font-size: 14px; }

  /* 玩家配色（与地产组色区分，走暖色系8色板） */
  :root {
    --pc-0: #E8935A;
    --pc-1: #4A6FA5;
    --pc-2: #6FB87F;
    --pc-3: #C9A0DC;
    --pc-4: #D9534F;
    --pc-5: #E8C547;
  }
  .pc-0 { background: var(--pc-0); }
  .pc-1 { background: var(--pc-1); }
  .pc-2 { background: var(--pc-2); }
  .pc-3 { background: var(--pc-3); }
  .pc-4 { background: var(--pc-4); }
  .pc-5 { background: var(--pc-5); }

  /* 顶部状态条 */
  .topbar {
    padding: 10px 16px;
    background: var(--panel);
    border-bottom: 3px solid var(--ink);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .topbar-title { font-weight: 800; font-size: 15px; }
  .conn-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); display: inline-block; margin-right: 6px; }
  .conn-dot.offline { background: var(--danger); }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: white;
    padding: 10px 18px;
    border-radius: var(--radius-s);
    font-size: 14px;
    z-index: 999;
    opacity: 0;
    transition: opacity 0.25s, transform 0.25s;
    pointer-events: none;
    max-width: 85%;
    text-align: center;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(-6px); }

  /* 加载动画 */
  .spinner {
    width: 28px; height: 28px;
    border: 4px solid var(--panel-border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---------- 游戏主界面 ---------- */
  .game-wrap {
    display: flex;
    flex-direction: column;
    padding: 10px;
    gap: 10px;
    flex: 1;
  }

  .player-strip {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 4px 2px;
  }
  .player-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--panel);
    border: 2.5px solid var(--panel-border);
    border-radius: var(--radius-s);
    padding: 8px 12px;
    flex-shrink: 0;
    opacity: 0.6;
  }
  .player-chip-active {
    border-color: var(--accent);
    opacity: 1;
    box-shadow: 2px 2px 0 var(--accent);
  }
  .player-chip-bankrupt { opacity: 0.35; filter: grayscale(1); }
  .player-chip-info { display: flex; flex-direction: column; line-height: 1.2; }
  .player-chip-job {
    font-size: 10px;
    color: var(--accent-deep);
    margin-top: 1px;
    cursor: pointer;
    text-decoration: underline dotted;
    width: fit-content;
  }
  .player-chip-job:active { opacity: 0.6; }

  .job-tooltip {
    position: fixed;
    background: var(--ink);
    color: white;
    padding: 8px 12px;
    border-radius: var(--radius-s);
    box-shadow: 0 4px 14px rgba(0,0,0,0.3);
    z-index: 600;
    max-width: 220px;
  }
  .player-chip-name { font-size: 11px; font-weight: 700; }
  .player-chip-cash { font-size: 16px; font-weight: 800; color: var(--accent-deep); }
  .player-chip-cash.cash-low-warning {
    color: var(--danger);
    animation: cash-flash 0.8s ease-in-out infinite;
  }
  @keyframes cash-flash {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }

  /* 棋盘：11x11 网格，外圈40格+中心信息区 */
  /* 镜头跟随：外层视窗固定大小+裁切溢出，内层棋盘用transform做缩放平移跟随当前玩家位置 */
  .board-viewport {
    width: 100%;
    aspect-ratio: 1 / 1;
    max-width: 100%;
    overflow: hidden;
    position: relative;
    border-radius: var(--radius-m);
  }
  .board-area {
    width: 100%;
    height: 100%;
    position: relative; /* 棋子用绝对定位叠加在棋盘上方，独立于格子DOM做滑动动画 */
    container-type: inline-size; /* 关键：让子元素可用 cqw 单位按本容器宽度缩放，不再受限于视口绝对像素 */
    container-name: boardarea;
    transition: transform 0.5s cubic-bezier(0.34, 1.2, 0.64, 1);
    transform-origin: center center;
  }
  .board-grid {
    display: grid;
    grid-template-columns: repeat(11, 1fr);
    grid-template-rows: repeat(11, 1fr);
    width: 100%;
    height: 100%;
    border: 3px solid var(--ink);
    border-radius: var(--radius-m);
    overflow: hidden;
    background: var(--panel);
    position: relative;
  }

  .camera-reset-btn {
    position: absolute;
    bottom: 6px;
    right: 6px;
    z-index: 50;
    background: rgba(74,55,40,0.85);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 5px 9px;
    font-size: 11px;
    cursor: pointer;
  }

  /* 棋子层：绝对定位覆盖在棋盘上，用left/top的transition实现滑动跳格效果 */
  .token-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 10;
  }
  .token-moving {
    position: absolute;
    transition: left 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), top 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    transform: translate(-50%, -50%);
    /* 棋子尺寸用容器宽度的百分比(cqw)而非固定px：棋盘越大，棋子也跟着等比例变大，
       在桌面宽屏上会明显比格子本身更突出醒目；min/max做兜底避免极端尺寸下棋子过小或过大 */
    width: clamp(26px, 9.5cqw, 56px);
    height: clamp(30px, 10.8cqw, 64px);
    z-index: 15; /* 确保棋子显示在格子插画、染色层之上，不会被遮挡 */
  }
  .token-bounce {
    animation: token-land 0.35s ease-out;
  }
  @keyframes token-land {
    0% { transform: translate(-50%, -50%) scale(1); }
    40% { transform: translate(-50%, -60%) scale(1.15); }
    100% { transform: translate(-50%, -50%) scale(1); }
  }

  /* 落地高亮悬浮层：克隆自目标格子，放大后自动恢复，强化"走到这里了"的视觉反馈 */
  .tile-highlight-popup {
    border: 1px solid var(--panel-border) !important;
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s;
    transform: scale(1);
  }
  .tile-highlight-popup.tile-landed-highlight {
    transform: scale(1.7);
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
  }

  .tile {
    position: relative;
    border: 1px solid var(--panel-border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    font-size: 1.7cqw;
    padding: 0.3cqw 0.2cqw;
    overflow: hidden;
    background: var(--panel);
  }
  .tile-corner {
    background: var(--bg);
    font-size: 2cqw;
    font-weight: 800;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .tile-colorbar { width: 100%; height: 1.4cqw; flex-shrink: 0; margin-bottom: 0.2cqw; }
  .tile-name {
    font-weight: 700;
    text-align: center;
    line-height: 1.05;
    word-break: break-all;
    color: var(--ink);
    position: relative;
    z-index: 2;
    text-shadow: 0 0 3px rgba(255,255,255,0.9), 0 0 3px rgba(255,255,255,0.9);
  }
  .tile-price {
    font-size: 1.6cqw;
    font-weight: 800;
    color: var(--ink);
    margin-top: auto;
    position: relative;
    z-index: 2;
    background: rgba(255,255,255,0.92);
    padding: 0.15cqw 0.5cqw;
    border-radius: 3px;
    -webkit-text-stroke: 0.15px var(--ink);
    box-shadow: 0 0 0 1px rgba(74,55,40,0.3);
  }
  .tile-owner-bar { width: 80%; height: 0.8cqw; border-radius: 2px; margin-top: 0.3cqw; }
  .tile-houses { font-size: 1.6cqw; margin-top: 0.2cqw; line-height: 1; position: relative; z-index: 2; }
  .tile-mortgaged { font-size: 1.3cqw; color: var(--danger); position: relative; z-index: 2; }
  .tile-tokens {
    position: absolute;
    bottom: 1px; right: 1px;
    display: flex;
    flex-wrap: wrap;
    gap: 1px;
    max-width: 90%;
    z-index: 3;
  }
  .tile-tokens .token { width: 2.4cqw; height: 2.4cqw; font-size: 1.2cqw; border-width: 1px; }

  .tile-go { background: #FFF3E0; }
  .tile-jail { background: #ECECEC; }
  .tile-freeparking { background: #F0FAF2; }
  .tile-gotojail { background: #FCEAEA; }
  .tile-tax { background: #FFF9E6; }
  .tile-card { background: #F3EEFB; }
  .tile-bank { background: #FFF8E1; }
  .tile-lottery { background: #FCE4EC; }
  .tile-station { background: #ECEFF9; }
  .tile-utility { background: #E8F5F0; }

  .tile-icon { font-size: 2.6cqw; line-height: 1; margin-bottom: 0.2cqw; position: relative; z-index: 2; }
  .tile-corner .tile-icon { font-size: 4cqw; }

  /* 填满格子的像素插画层：每个地块独立绘制的SVG背景图，铺满整格，z-index在文字之下 */
  .tile-art {
    position: absolute;
    inset: 0;
    z-index: 1;
    opacity: 0.9;
  }
  .tile-art svg { width: 100%; height: 100%; display: block; }

  /* 所有权染色：整块格子背景变为玩家主题色的淡化版本，一眼看出归属 */
  .tile-owned-bg {
    position: absolute;
    inset: 0;
    opacity: 0.38;
    z-index: 2;
  }
  .tile > * { position: relative; }
  .tile-art, .tile-owned-bg { position: absolute; }

  .board-center {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .dice-display { display: flex; gap: 10px; }
  .die {
    width: 44px; height: 44px;
    border: 3px solid var(--ink);
    border-radius: var(--radius-s);
    background: white;
    color: var(--ink); /* 显式设置深色文字，避免被外层浮层的白色文字(color:white)继承覆盖导致白底白字看不见 */
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 900;
    box-shadow: var(--shadow-pixel);
    perspective: 200px;
  }
  .die-face {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
  }
  .die.rolling .die-face {
    animation: dice-roll 0.08s steps(1) infinite;
  }
  .die.rolling {
    animation: dice-shake 0.15s ease-in-out infinite;
  }
  @keyframes dice-roll {
    0% { transform: rotateX(0deg); }
    100% { transform: rotateX(360deg); }
  }
  @keyframes dice-shake {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    25% { transform: translate(-2px, 1px) rotate(-4deg); }
    75% { transform: translate(2px, -1px) rotate(4deg); }
  }
  .die.settled .die-face {
    animation: dice-settle 0.3s ease-out;
  }
  @keyframes dice-settle {
    0% { transform: scale(1.3) rotate(15deg); }
    60% { transform: scale(0.9) rotate(-5deg); }
    100% { transform: scale(1) rotate(0deg); }
  }

  .turn-banner {
    text-align: center;
    padding: 10px;
    border-radius: var(--radius-s);
    background: var(--panel-border);
    font-weight: 700;
    font-size: 14px;
    color: var(--ink-soft);
  }
  .turn-banner-mine {
    background: var(--accent);
    color: white;
  }

  .action-panel { min-height: 56px; }

  .log-box {
    max-height: 150px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .log-line {
    font-size: 12px;
    color: var(--ink-soft);
    padding: 2px 0;
    border-bottom: 1px dashed var(--panel-border);
  }

  /* 棋盘中心覆盖层：绝对定位在viewport上，不受board-area-inner的transform缩放影响，
     视觉上正好覆盖棋盘中央9x9空白区域（11格中去掉最外圈一格） */
  .board-center-overlay {
    position: absolute;
    /* 9/11 ≈ 81.8%，留出外圈一格的边距，让覆盖层正好对齐棋盘中央空白 */
    top: calc(100% / 11);
    left: calc(100% / 11);
    width: calc(100% * 9 / 11);
    height: calc(100% * 9 / 11);
    z-index: 20;
    display: flex;
    flex-direction: column;
    padding: 2%;
    pointer-events: none; /* 默认不拦截点击，只有内部真实的可交互元素才接收点击 */
  }
  .board-center-overlay > * { pointer-events: auto; }
  .center-overlay-lottery-tip {
    font-size: 11px;
    color: var(--ink-soft);
    background: white;
    padding: 3px 8px;
    border-radius: 8px;
    border: 1.5px solid var(--panel-border);
    align-self: center;
    margin-bottom: 6px;
    flex-shrink: 0;
  }

  /* 动态/聊天 左右分栏并存（不再是标签切换），在棋盘中心覆盖层里使用，尺寸更紧凑 */
  .split-panel {
    display: flex;
    gap: 6px;
    align-items: stretch;
    flex: 1;
    min-height: 0;
    background: rgba(255,255,255,0.94);
    border: 2px solid var(--ink);
    border-radius: var(--radius-s);
    padding: 6px;
    overflow: hidden;
  }
  .split-col {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .split-col .log-box { flex: 1; overflow-y: auto; max-height: none; min-height: 0; }
  .split-divider {
    width: 1px;
    background: var(--panel-border);
    flex-shrink: 0;
  }
  .split-col .log-line { font-size: 10px; padding: 1px 0; }
  .split-col input.input { font-size: 11px; padding: 6px 8px; }
  .split-col .btn { font-size: 10px; padding: 5px 7px; }

  /* 建房弹窗 */
  /* 聊天图片缩略图 + 全屏图片浏览器 */
  .chat-thumb {
    max-width: 80px;
    max-height: 80px;
    border-radius: 6px;
    border: 1.5px solid var(--panel-border);
    cursor: pointer;
    object-fit: cover;
  }
  .image-viewer-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    align-items: center;

// 生成一个 32x32 像素风格小人头像的 SVG 字符串
function renderPixelAvatar(player, size = 28, walkFrame = 0) {
  const { skin, hair, shirt, hairStyle } = getPlayerAppearance(player);
  const skinDark = darkenColor(skin, 0.75);
  const shirtDark = darkenColor(shirt, 0.7);
  const shirtLight = darkenColor(shirt, 1.15);

  // 等距视角(isometric)立体小人：用"顶面菱形(亮)+左侧面(中)+右侧面(暗)"三块面表现立体感，
  // 整体呈斜45度俯视的"方块小人"造型，类似经典等距像素游戏的角色表现方式
  let hairTop = "";
  switch (hairStyle) {
    case "short": case "spiky":
      hairTop = `<polygon points="16,3 25,8 16,13 7,8" fill="${hair}"/>`;
      break;
    case "long": case "curly":
      hairTop = `<polygon points="16,2 26,8 16,14 6,8" fill="${hair}"/><rect x="6" y="8" width="3" height="10" fill="${hair}"/><rect x="23" y="8" width="3" height="10" fill="${hair}"/>`;
      break;
    case "bun":
      hairTop = `<polygon points="16,3 25,8 16,13 7,8" fill="${hair}"/><polygon points="16,0 20,2 16,4 12,2" fill="${hair}"/>`;
      break;
    case "bald":
    default:
      hairTop = `<polygon points="16,5 23,9 16,13 9,9" fill="${skinDark}"/>`;
  }

  const jobBadge = renderJobBadge(player.jobId);

  // 走路动画：两个姿态交替，模拟脚步前后摆动（isometric小人通过左右脚的前后位移表现走动）
  const legOffset = walkFrame % 2 === 0 ? 0 : 2;
  const armSwing = walkFrame % 2 === 0 ? 0 : -1;

  return `
  <svg viewBox="0 0 32 36" width="${size}" height="${size * 36 / 32}" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
    <!-- 阴影：脚下的椭圆投影，强化"立在地面上"的体积感 -->
    <ellipse cx="16" cy="33" rx="9" ry="2.4" fill="rgba(0,0,0,0.18)"/>

    <!-- 身体：等距立方体造型，三块面(顶/左侧/右侧)营造立体感 -->
    <polygon points="9,20 16,16 23,20 23,29 16,33 9,29" fill="${shirt}"/>
    <polygon points="9,20 16,16 16,25 9,29" fill="${shirtLight}"/>
    <polygon points="16,16 23,20 23,29 16,25" fill="${shirtDark}"/>

    <!-- 腿：两条，走路时交替前后偏移 -->
    <rect x="${11 - legOffset}" y="29" width="3" height="5" fill="${shirtDark}"/>
    <rect x="${18 + legOffset}" y="29" width="3" height="5" fill="${shirtDark}"/>

    <!-- 手臂：随走路摆动 -->
    <rect x="${7 + armSwing}" y="21" width="3" height="7" fill="${shirt}"/>
    <rect x="${22 - armSwing}" y="21" width="3" height="7" fill="${shirtDark}"/>

    <!-- 头部：同样用三块面表现立体感 -->
    <polygon points="9,9 16,5 23,9 23,17 16,21 9,17" fill="${skin}"/>
    <polygon points="9,9 16,5 16,13 9,17" fill="${skin}"/>
    <polygon points="16,5 23,9 23,17 16,13" fill="${skinDark}"/>

    <!-- 头发：覆盖在头顶 -->
    ${hairTop}

    <!-- 五官：画在正面朝向的那一侧 -->
    <rect x="12" y="13" width="2" height="2" fill="#2A2018"/>
    <rect x="18" y="13" width="2" height="2" fill="#2A2018"/>
    <rect x="14" y="16" width="4" height="1.5" fill="#C9786B"/>

    ${jobBadge}
  </svg>`;
}

// 简单的颜色明暗调整工具：factor<1变暗，factor>1变亮，用于给等距小人的不同侧面制造光影差异
function darkenColor(hex, factor) {
  const c = hex.replace("#", "");
  const r = Math.min(255, Math.max(0, Math.round(parseInt(c.substring(0, 2), 16) * factor)));
  const g = Math.min(255, Math.max(0, Math.round(parseInt(c.substring(2, 4), 16) * factor)));
  const b = Math.min(255, Math.max(0, Math.round(parseInt(c.substring(4, 6), 16) * factor)));
  return `#${r.toString(16).padStart(2, "0")}${g.toString(16).padStart(2, "0")}${b.toString(16).padStart(2, "0")}`;
}

// ---------- 应用状态 ----------
const App = {
  screen: "home", // home | create | join | room
  ws: null,
  playerId: null,
  playerName: "",
  roomId: null,
  gameState: null,
  connected: false,
  reconnectTimer: null,
  reconnectAttempts: 0,
  soundEnabled: true,
  autoPilot: false,
  lastSeenLogIndex: 0, // 用于检测新日志，触发对应音效
  awaitingOwnDiceResult: false, // 标记"我刚点了掷骰子，正在等真实结果广播回来"，用于播报队列插队逻辑
};

// ---------- 音效系统（Web Audio API 实时合成，无需任何外部音频文件）----------
let audioCtx = null;
let audioUnlocked = false;

function getAudioCtx() {
  if (!audioCtx) {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch (e) {
      return null;
    }
  }
  return audioCtx;
}

// 浏览器要求 AudioContext 必须在真实用户手势的同步调用栈内创建/恢复才能可靠解锁，
// 否则即使后面调用 resume() 也可能持续处于 suspended 状态导致完全无声。
// 这里在文档级别监听第一次点击/触摸，同步尝试创建+恢复，且额外播放一个静音的极短音作为"激活"动作。
function unlockAudioOnFirstInteraction() {
  if (audioUnlocked) return;
  const ctx = getAudioCtx();
  if (!ctx) return;
  audioUnlocked = true;

  const tryResume = () => {
    if (ctx.state === "suspended") {
      ctx.resume().catch(() => {});
    }
    // 播放一个几乎听不见的静音触发音，部分浏览器(尤其iOS Safari)需要真正调用一次start()才算解锁
    try {
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      g.gain.value = 0.0001;
      osc.connect(g);
      g.connect(ctx.destination);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.01);
    } catch (e) {}
  };
  tryResume();

  document.removeEventListener("click", unlockAudioOnFirstInteraction);
  document.removeEventListener("touchstart", unlockAudioOnFirstInteraction);
}
document.addEventListener("click", unlockAudioOnFirstInteraction, { once: false });
document.addEventListener("touchstart", unlockAudioOnFirstInteraction, { once: false });

// 播放一个简单的合成音：频率序列 + 波形 + 包络
function playTone(freqs, { duration = 0.12, type = "square", gain = 0.08, gap = 0.04 } = {}) {
  if (!App.soundEnabled) return;
  const ctx = getAudioCtx();
  if (!ctx) return;
  if (ctx.state === "suspended") {
    // 仍处于suspended说明还没真正解锁成功，尝试恢复但这次调用很可能仍然静音，
    // 不阻塞返回，让游戏逻辑继续，下一次用户交互后会自然解锁
    ctx.resume().catch(() => {});
  }

  let t = ctx.currentTime;
  freqs.forEach((freq) => {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(gain, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.001, t + duration);
    osc.connect(g);
    g.connect(ctx.destination);
    osc.start(t);
    osc.stop(t + duration + 0.02);
    t += duration + gap;
  });
}

const SFX = {

  win: () => playTone([523, 659, 784, 1046], { duration: 0.16, type: "triangle", gain: 0.12, gap: 0.03 }),
  jackpot: () => playTone([659, 784, 988, 1318, 988, 1318], { duration: 0.1, type: "triangle", gain: 0.11, gap: 0.01 }),
  notify: () => playTone([700, 900], { duration: 0.07, type: "sine", gain: 0.06, gap: 0.01 }),

// 按落地的地块类型播放对应的到达反馈音效
function playArrivalSfx(tile) {
  switch (tile.type) {
    case "jail": case "gotojail":
      SFX.jail();
      break;
    case "bank":
      SFX.bank();
      break;
    case "lottery":
      SFX.lottery();
      break;
    case "card":
      SFX.card();
      break;
    case "tax":
      SFX.payRent();
      break;
    default:
      SFX.notify();
  }
}

// 根据日志文本内容推断该播放哪个音效（轻量启发式，不需要服务器额外传事件类型）
function inferSfxFromLogText(text) {
  if (text.includes("破产")) return SFX.bankrupt;
  if (text.includes("获胜")) return SFX.win;
  if (text.includes("开标") || text.includes("中奖") || text.includes("开奖") && text.includes("🎉")) return SFX.jackpot;
  if (text.includes("购买了")) return SFX.buy;
  if (text.includes("住院") || text.includes("过劳")) return SFX.hospital;
  if (text.includes("监狱") || text.includes("出狱") || text.includes("越狱")) return SFX.jail;
  if (text.includes("抽到")) return SFX.card;
  if (text.includes("支付租金") || text.includes("缴纳")) return SFX.payRent;
  return null;
}

// 扫描新增日志，播放对应音效 + 依次大字播报（在每次state更新后调用）
function playSfxForNewLogs(state) {
  if (!state || !state.log) return;
  const newLogs = state.log.slice(App.lastSeenLogIndex);
  newLogs.forEach((l) => {
    const sfx = inferSfxFromLogText(l.text);
    if (sfx) sfx();
  });
  App.lastSeenLogIndex = state.log.length;

  // 把新日志加入播报队列，依次大字展示（避免多条同时弹出互相覆盖）
  // 过滤掉"掷出"和"来到"相关的日志：这两类信息已经由骰子专属展示形式（真实骰子图标+落地地块名）
  // 完整展示过了，如果不过滤会导致同一次掷骰子事件被播报两遍（先是骰子结果，紧接着又单独弹出"来到XX"）
  if (newLogs.length > 0) {
    const filtered = newLogs.filter((l) => !l.text.includes("掷出") && !/^.+来到/.test(l.text));
    AnnounceQueue.items.push(...filtered.map((l) => ({ type: "text", data: l.text })));
    processAnnounceQueue();
  }
}

// ---------- 大字播报队列：确保多条新日志/骰子结果依次展示，不互相打断覆盖 ----------
const AnnounceQueue = {
  items: [], // { type: 'text'|'dice', data }
  showing: false,
};

function processAnnounceQueue() {
  if (AnnounceQueue.showing) return; // 当前正在展示中，等它结束后会自动继续处理队列
  const item = AnnounceQueue.items.shift();
  if (!item) return;

  AnnounceQueue.showing = true;
  let displayMs;
  if (item.type === "dice") {
    showDiceAnnounce(item.data);
    displayMs = 3200; // 之前2200ms偏短，延长到3200ms给用户足够时间看清骰子结果
  } else {
    showLogAnnounce(item.data);
    // 之前最短1400ms/最长2600ms/每字90ms 偏短导致文字来不及看完，整体延长：
    // 最短2200ms，最长4000ms，每字130ms
    displayMs = Math.min(4000, Math.max(2200, item.data.length * 130));
  }

  setTimeout(() => {
    AnnounceQueue.showing = false;
    processAnnounceQueue(); // 继续展示队列里的下一条（如果有）
  }, displayMs);
}

// 展示一条文字动态的大字播报（与掷骰子播报共用同一个浮层，文案不同）
function showLogAnnounce(text) {
  const overlay = $("#dice-announce-overlay");
  if (!overlay) return;
  overlay.innerHTML = "";
  overlay.classList.remove("rolling-state");
  overlay.appendChild(el("div", { style: "font-size:15px; line-height:1.4;" }, text));
  overlay.classList.add("show");
  clearTimeout(overlay._timer);
  const hideDelay = Math.min(4000, Math.max(2200, text.length * 130)) - 200;
  overlay._timer = setTimeout(() => overlay.classList.remove("show"), Math.max(200, hideDelay));
}

// ---------- 工具函数 ----------
function $(sel) { return document.querySelector(sel); }
function el(tag, props = {}, children = []) {
  const node = document.createElement(tag);
  Object.entries(props).forEach(([k, v]) => {
    if (k === "class") node.className = v;
    else if (k === "html") node.innerHTML = v;
    else if (k.startsWith("on") && typeof v === "function") node.addEventListener(k.slice(2), v);
    else node.setAttribute(k, v);
  });
  (Array.isArray(children) ? children : [children]).forEach((c) => {
    if (c == null) return;
    node.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  });
  return node;
}

function showToast(msg, duration = 2400) {
  const t = $("#toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove("show"), duration);
}

function showDiceAnnounce(announce) {
  const overlay = $("#dice-announce-overlay");
  if (!overlay || !announce) return;
  const [d1, d2] = announce.dice;
  const toTile = announce.toPos != null ? BOARD[announce.toPos] : null;

  SFX.diceSettle(); // 骰子定格音效
  if (toTile) {
    setTimeout(() => playArrivalSfx(toTile), 250); // 稍微延迟，避免跟骰子音效叠在一起分不清
  }

  overlay.innerHTML = "";
  overlay.appendChild(el("div", { style: "font-size:14px; margin-bottom:6px;" }, `${announce.playerName} 掷出了`));

  const diceRow = el("div", { class: "dice-display" });
  const die1 = makeDieEl(d1);
  const die2 = makeDieEl(d2);
  diceRow.appendChild(die1);
  diceRow.appendChild(die2);
  overlay.appendChild(diceRow);

  overlay.appendChild(el("div", { style: "font-size:13px; font-weight:400; margin-top:6px; opacity:0.85;" },
    toTile ? `共 ${d1 + d2} 点，来到了 ${toTile.name}` : `共 ${d1 + d2} 点`
  ));

  overlay.classList.remove("rolling-state");
  overlay.classList.add("show");
  clearTimeout(overlay._timer);
  overlay._timer = setTimeout(() => overlay.classList.remove("show"), 3200);
}

// 显示"滚动中"的骰子浮层（点击掷骰子按钮后立即调用，此时还没有真实结果，只是视觉上的滚动动效）
function showDiceRollingOverlay(playerName) {
  const overlay = $("#dice-announce-overlay");
  if (!overlay) return;

  // 自己主动掷骰子是即时反馈，优先级最高：抢占显示，并标记队列为"忙碌"，
  // 避免队列里可能正在计时的旧内容在到期后突然打断这次滚动画面
  AnnounceQueue.showing = true;

  overlay.innerHTML = "";
  overlay.appendChild(el("div", { style: "font-size:14px; margin-bottom:6px;" }, `${playerName} 正在掷骰子…`));

  const diceRow = el("div", { class: "dice-display" });
  const die1 = makeDieEl(0);
  const die2 = makeDieEl(0);
  die1.classList.add("rolling");
  die2.classList.add("rolling");
  diceRow.appendChild(die1);
  diceRow.appendChild(die2);
  overlay.appendChild(diceRow);

  overlay.classList.add("show");
  overlay.classList.add("rolling-state");
  clearTimeout(overlay._timer); // 滚动阶段不设自动消失，等真实结果(showDiceAnnounce)来了再控制消失时机
}

// ---------- 自动托管：开启后，轮到自己时按简单策略自动操作，用于暂时离开不耽误其他人 ----------
function maybeAutoPilot(state) {
  if (!App.autoPilot) return;
  if (!state || state.phase !== "playing") return;
  const cp = state.players[state.currentPlayerIndex];
  if (!cp || cp.id !== App.playerId) return;
  const me = cp;
  if (me.bankrupt) return;

  // 稍微延迟一下再操作，模拟"思考"，也给UI一点时间渲染当前状态，避免操作过快显得突兀
  setTimeout(() => {
    if (!App.autoPilot) return; // 延迟期间可能被取消
    const s = App.gameState;
    if (!s || s.phase !== "playing") return;
    const curr = s.players[s.currentPlayerIndex];
    if (!curr || curr.id !== App.playerId) return;

    const phase = s.turnSubPhase;
    if (phase === "rolling") {
      sendAction("rollDice");
    } else if (phase === "awaitingBuy") {
      // 策略：现金大于400才买，避免托管期间因买地花光现金
      sendAction("buyProperty", { buy: curr.cash > 400 });
    } else if (phase === "awaitingBank") {
      sendAction("bankLeave"); // 托管默认不主动理财，避免误操作产生贷款
    } else if (phase === "awaitingLottery") {
      sendAction("lotterySkip");
    } else if (phase === "awaitingGamble") {
      sendAction("gambleChoice", { wantsGamble: false }); // 托管默认稳妥交租，不赌
    } else if (phase === "awaitingBagBid") {
      sendAction("bagBidSkip");
    }
  }, 600);
}

function getOrCreatePlayerId() {
  let pid = localStorage.getItem("monopoly_player_id");
  if (!pid) {
    pid = "p_" + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
    localStorage.setItem("monopoly_player_id", pid);
  }
  return pid;
}

function saveSession(roomId, name) {
  localStorage.setItem("monopoly_room_id", roomId);
  localStorage.setItem("monopoly_player_name", name);
}
function clearSession() {
  localStorage.removeItem("monopoly_room_id");
}

// ---------- WebSocket 连接管理 ----------
function connectToRoom(roomId, playerName) {
  if (App.ws) {
    try { App.ws.close(); } catch (e) {}
  }
  App.roomId = roomId;
  App.playerName = playerName;
  App.playerId = getOrCreatePlayerId();

  const url = `${WS_URL}/ws/${roomId}?playerId=${encodeURIComponent(App.playerId)}&name=${encodeURIComponent(playerName)}`;
  const ws = new WebSocket(url);
  App.ws = ws;

  ws.addEventListener("open", () => {
    App.connected = true;
    App.reconnectAttempts = 0;
    updateConnDot();
  });

  ws.addEventListener("message", (event) => {
    let msg;
    try { msg = JSON.parse(event.data); } catch (e) { return; }

    if (msg.type === "welcome") {
      App.playerId = msg.playerId;
      App.gameState = msg.state;
      App.lastSeenLogIndex = msg.state.log ? msg.state.log.length : 0; // 初始连接不补放历史音效
      saveSession(roomId, playerName);
      App.screen = "room";
      render();
    } else if (msg.type === "state") {
      const prevPhase = App.gameState?.phase;
      const prevChatLen = App.gameState?.chat?.length || 0;
      const prevDiceAnnounce = App.gameState?.lastDiceAnnounce;
      App.gameState = msg.state;

      playSfxForNewLogs(msg.state);
      if ((msg.state.chat?.length || 0) > prevChatLen) {
        SFX.chat();
      }
      // 检测新的骰子播报，加入统一播报队列（与文字日志共用排队机制，避免互相打断覆盖）
      if (msg.state.lastDiceAnnounce && msg.state.lastDiceAnnounce !== prevDiceAnnounce) {
        const announce = msg.state.lastDiceAnnounce;
        if (App.awaitingOwnDiceResult) {
          // 自己刚点击了掷骰子，正在等待这个真实结果：立即插队播放，不用排到队尾等待
          App.awaitingOwnDiceResult = false;
          AnnounceQueue.items.unshift({ type: "dice", data: announce });
          AnnounceQueue.showing = false; // 解除之前"正在掷骰子"占用的忙碌标记，让队列重新处理
          processAnnounceQueue();
        } else {
          AnnounceQueue.items.push({ type: "dice", data: announce });
          processAnnounceQueue();
        }
        // 触发分步走路动画：只有"正常掷骰子移动"（步数与骰子点数一致）才走格子动画，
        // 命运卡传送（步数与骰子不符）保留原本的平滑瞬移
        if (announce.fromPos != null && announce.toPos != null) {
          const diceSum = announce.dice[0] + announce.dice[1];
          const path = computeWalkPath(announce.fromPos, announce.toPos);
          const isDiceMove = path.length === diceSum; // 步数吻合→正常骰子移动
          if (isDiceMove && path.length > 1) {
            animateWalkPath(announce.playerId, announce.fromPos, path);
          }
          // 如果是传送（命运卡），棋子会在下面的 render() 调用里直接更新到终点位置，自然实现瞬移
        }
      }

      if (App.screen !== "room") { App.screen = "room"; }
      render();
      if (prevPhase === "waiting" && msg.state.phase === "playing") {
        showToast("游戏开始！");
      }
      // 自动托管：轮到自己且开启了托管时，按简单策略自动操作
      maybeAutoPilot(msg.state);
    } else if (msg.type === "error") {
      showToast(msg.message);
      SFX.error();
      if (App.awaitingOwnDiceResult) {
        // 掷骰子请求被拒绝（比如"还没轮到你"），清理等待标记和滚动浮层，避免卡在"正在掷骰子"画面
        App.awaitingOwnDiceResult = false;
        AnnounceQueue.showing = false;
        const overlay = $("#dice-announce-overlay");
        if (overlay) overlay.classList.remove("show");
        processAnnounceQueue();
      }
    }
  });

  ws.addEventListener("close", () => {
    App.connected = false;
    updateConnDot();
    scheduleReconnect();
  });

  ws.addEventListener("error", () => {
    App.connected = false;
    updateConnDot();
  });
}

function scheduleReconnect() {
  if (App.reconnectTimer) return;
  if (!App.roomId) return;
  App.reconnectAttempts += 1;
  const delay = Math.min(1000 * App.reconnectAttempts, 8000);
  App.reconnectTimer = setTimeout(() => {
    App.reconnectTimer = null;
    if (App.roomId && App.screen === "room") {
      connectToRoom(App.roomId, App.playerName);
    }
  }, delay);
}

function sendAction(type, payload = {}) {
  if (!App.ws || App.ws.readyState !== WebSocket.OPEN) {
    showToast("连接已断开，正在重连…");
    return;
  }
  App.ws.send(JSON.stringify({ type, ...payload }));
}

// ---------- 棋盘渲染：40格矩形外圈布局 ----------
// 布局规则：底边 0-10（从右到左），左边 10-20（从下到上），顶边 20-30（从左到右），右边 30-0（从上到下）
function getTileGridPosition(tileId) {
  // 使用 11x11 网格，四角是角格，四边各9个非角格
  if (tileId <= 10) return { col: 10 - tileId, row: 10 };          // 底边，从右到左
  if (tileId <= 20) return { col: 0, row: 10 - (tileId - 10) };     // 左边，从下到上
  if (tileId <= 30) return { col: tileId - 20, row: 0 };            // 顶边，从左到右
  return { col: 10, row: tileId - 30 };                              // 右边，从上到下
}

// 格子中心点的百分比坐标（11x11网格，每格约9.0909%），用于棋子绝对定位
function getTileCenterPercent(tileId) {
  const { col, row } = getTileGridPosition(tileId);
  return {
    leftPct: ((col + 0.5) / 11) * 100,
    topPct: ((row + 0.5) / 11) * 100,
  };
}

// 计算从fromPos走到toPos途经的每一格（正向，处理绕过起点的取模情况）。
// 返回的数组不包含fromPos本身，但包含toPos，用于棋子"一格格走"的动画播放。
// steps上限给个保护，避免異常数据（比如fromPos===toPos或超大步数）导致生成过长数组卡死。
// 正在播放分步走路动画的玩家id集合：这些玩家的棋子位置由动画控制，
// updateTokenPositions需要跳过它们，避免直接覆盖到终点把动画打断
const WalkAnimationLocks = new Set();

function animateWalkPath(playerId, fromPos, path) {
  const STEP_INTERVAL = 150;
  WalkAnimationLocks.add(playerId);

  path.forEach((stepPos, idx) => {
    setTimeout(() => {
      const tokenEl = document.getElementById(`token-${playerId}`);
      if (!tokenEl) {
        WalkAnimationLocks.delete(playerId);
        return;
      }

      const { leftPct, topPct } = getTileCenterPercent(stepPos);
      tokenEl.style.left = `${leftPct}%`;
      tokenEl.style.top = `${topPct}%`;
      SFX.step();

      if (idx === path.length - 1) {
        tokenEl.classList.remove("token-bounce");
        requestAnimationFrame(() => tokenEl.classList.add("token-bounce"));
        highlightLandedTile(stepPos);
        // 动画结束，释放锁
        WalkAnimationLocks.delete(playerId);
      }
    }, idx * STEP_INTERVAL);
  });
}

function computeWalkPath(fromPos, toPos) {
  if (fromPos == null || toPos == null || fromPos === toPos) return [toPos];
  const path = [];
  let cur = fromPos;
  let guard = 0;
  while (cur !== toPos && guard < 40) {
    cur = (cur + 1) % 40;
    path.push(cur);
    guard++;
  }
  return path.length > 0 ? path : [toPos];
}

function renderBoard(state) {

  const viewport = el("div", { class: "board-viewport" }, [boardArea]);

  }

  viewport.appendChild(centerOverlay);

  // 确保棋盘始终是正常大小（镜头跟随功能已取消）
  setTimeout(() => applyCameraTransform(), 0);

  return viewport;
}

// ---------- 镜头跟随系统 ----------
// 镜头系统：经实测，自动缩放跟随会让放大后的棋盘被中心信息面板（动态/聊天）几乎完全遮挡，
// 可视棋盘范围被压缩到只剩一窄条，体验不佳，因此固定使用全局视图，不再自动缩放跟随玩家。
const Camera = {
  locked: false,
};

function applyCameraTransform() {
  const boardAreaInner = document.getElementById("board-area-inner");
  if (!boardAreaInner) return;
  boardAreaInner.style.transform = "translate(0px, 0px) scale(1)";
}

// 棋子渲染：同格多个玩家时，按小圆环方式错开排布，避免完全重叠
function renderTokens(state, layer) {
  const tilePlayers = {}; // tileId -> [players]
  state.players.forEach((p) => {
    if (p.bankrupt) return;
    tilePlayers[p.position] = tilePlayers[p.position] || [];
    tilePlayers[p.position].push(p);
  });

  Object.entries(tilePlayers).forEach(([tileId, players]) => {
    const { leftPct, topPct } = getTileCenterPercent(Number(tileId));
    const n = players.length;
    players.forEach((p, idx) => {
      // 多人同格时，围绕格子中心做偏移，避免完全重叠看不清（棋子变大后偏移半径也相应增大）
      const offsetAngle = (idx / Math.max(n, 1)) * 2 * Math.PI;
      const offsetRadius = n > 1 ? 3 : 0;
      const left = leftPct + Math.cos(offsetAngle) * offsetRadius;
      const top = topPct + Math.sin(offsetAngle) * offsetRadius;

      const tokenEl = el("div", {
        id: `token-${p.id}`,
        class: "token-moving",
        style: `left:${left}%; top:${top}%;`,
        title: p.name,
      });
      tokenEl.innerHTML = renderPixelAvatar(p, TOKEN_DISPLAY_SIZE, WalkAnimation.frame);
      // 等距立体小人不再用圆形裁切容器（会切掉立体感），改为无背景无边框的透明容器，小人本身自带阴影投影
      layer.appendChild(tokenEl);
    });
  });
}

// ---------- 棋盘小人走路动画驱动：全局定时器循环切换走路帧，让所有棋子持续有"走动感" ----------
// 棋子在棋盘上的显示尺寸（SVG内部viewBox像素值，用于renderPixelAvatar的size参数；
// 外层容器的实际CSS尺寸由.token-moving的clamp()控制，会随棋盘实际宽度做比例缩放）
const TOKEN_DISPLAY_SIZE = 32;

const WalkAnimation = {
  frame: 0,
  timer: null,
};
function startWalkAnimationLoop() {
  if (WalkAnimation.timer) return; // 已经在跑了，不重复启动
  WalkAnimation.timer = setInterval(() => {
    WalkAnimation.frame = (WalkAnimation.frame + 1) % 2;
    // 只在游戏进行中、且棋子层存在时才重绘帧，避免无意义的DOM操作
    const layer = document.getElementById("token-layer");
    if (layer && App.gameState && App.gameState.phase === "playing") {
      layer.querySelectorAll(".token-moving").forEach((tokenEl) => {
        const pid = tokenEl.id.replace("token-", "");
        const p = App.gameState.players.find((pl) => pl.id === pid);
        if (p) tokenEl.innerHTML = renderPixelAvatar(p, TOKEN_DISPLAY_SIZE, WalkAnimation.frame);
      });
    }
  }, 450);
}
startWalkAnimationLoop();

      ? el("div", { class: "player-chip-job", title: "点击查看职业效果" }, `${job.icon} ${job.name}`)
      : null;
    if (jobLabel) {
      jobLabel.addEventListener("click", (e) => {
        e.stopPropagation();
        showJobTooltip(jobLabel, job);
      });
    }

    playerStrip.appendChild(el("div", {
      class: `player-chip ${p.id === cp.id ? "player-chip-active" : ""} ${p.bankrupt ? "player-chip-bankrupt" : ""}`,
    }, [
      avatarWrap,
      el("div", { class: "player-chip-info" }, [
        el("div", { class: "player-chip-name" }, p.name + (p.id === App.playerId ? "（你）" : "")),
        el("div", { class: "player-chip-cash" + (isLowCash ? " cash-low-warning" : "") }, p.bankrupt ? "💥 破产" : `$${p.cash}`),
        jobLabel,
      ]),
      !p.connected ? el("span", { class: "conn-dot offline", style: "margin-left:4px;" }) : null,
    ]));
  });
  return playerStrip;
}

// 点击职业标签时，弹出一个小气泡显示该职业的效果说明，再次点击别处会自动关闭
function showJobTooltip(anchorEl, job) {
  closeJobTooltip(); // 先关掉可能存在的上一个气泡，避免叠加

  const rect = anchorEl.getBoundingClientRect();
  const tooltip = el("div", {
    id: "job-tooltip",
    class: "job-tooltip",
    style: `left:${rect.left}px; top:${rect.bottom + 6}px;`,
  }, [
    el("div", { style: "font-weight:800; margin-bottom:4px;" }, `${job.icon} ${job.name}`),
    el("div", { style: "font-size:12px; line-height:1.4;" }, job.desc),
  ]);
  document.body.appendChild(tooltip);

  // 点击气泡之外的任何地方都关闭它
  setTimeout(() => {
    document.addEventListener("click", closeJobTooltip, { once: true });
  }, 0);
}

function closeJobTooltip() {
  const existing = document.getElementById("job-tooltip");
  if (existing) existing.remove();
}

function buildLogBox(state) {
  const logBox = el("div", { class: "log-box" });
  state.log.slice(-12).reverse().forEach((l) => {
    const timeStr = formatTimeHHMMSS(l.ts);
    logBox.appendChild(el("div", { class: "log-line" }, [
      el("span", { style: "color:var(--ink-soft); font-size:10px; margin-right:6px;" }, timeStr),
      l.text,
    ]));
  });
  return logBox;
}

function formatTimeHHMMSS(ts) {
  if (!ts) return "";
  const d = new Date(ts);
  const pad = (n) => String(n).padStart(2, "0");
  return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

// ---------- 聊天图片：上传到R2，成功后自动发送聊天消息 ----------
async function uploadAndSendChatImage(file) {
  if (file.size > 5 * 1024 * 1024) {
    showToast("图片太大，请选择5MB以内的图片");
    return;
  }
  showToast("图片上传中…");
  try {
    const resp = await fetch(`${BACKEND_URL}/api/upload-image`, {
      method: "POST",
      headers: { "Content-Type": file.type },
      body: file,
    });
    const data = await resp.json();
    if (!resp.ok || !data.url) {
      showToast(data.error || "图片上传失败");
      return;
    }
    sendAction("sendChat", { text: "", imageUrl: data.url });
  } catch (e) {
    showToast("图片上传失败，请检查网络");
  }
}

// ---------- 图片浏览器：点击缩略图放大显示原图，再点击收起 ----------
function openImageViewer(fullUrl) {
  const overlay = el("div", { class: "image-viewer-overlay" });
  const img = el("img", { src: fullUrl, class: "image-viewer-full" });
  img.addEventListener("click", () => overlay.remove());
  overlay.addEventListener("click", (e) => { if (e.target === overlay) overlay.remove(); });
  overlay.appendChild(img);
  document.body.appendChild(overlay);
}

function buildChatPanel(state) {
  const chatWrap = el("div", {});
  const chatBox = el("div", { class: "log-box", id: "chat-box", style: "max-height:150px;" });
  (state.chat || []).slice(-30).forEach((c) => {
    const isMine = c.playerId === App.playerId;
    const lineChildren = [
      el("span", { style: "color:var(--ink-soft); font-size:10px; margin-right:6px;" }, formatTimeHHMMSS(c.ts)),
      el("b", {}, c.name + "："),
    ];
    if (c.text) lineChildren.push(c.text);
    if (c.imageUrl) {
      const thumb = el("img", {
        src: BACKEND_URL + c.imageUrl,
        class: "chat-thumb",
        style: "display:block; margin-top:3px;",
      });
      thumb.addEventListener("click", () => openImageViewer(BACKEND_URL + c.imageUrl));
      lineChildren.push(thumb);
    }
    chatBox.appendChild(el("div", {
      class: "log-line",
      style: isMine ? "color:var(--accent-deep); font-weight:600;" : "",
    }, lineChildren));
  });
  if (!state.chat || state.chat.length === 0) {
    chatBox.appendChild(el("div", { style: "color:var(--ink-soft); text-align:center; padding:10px 0;" }, "还没有人说话，打个招呼吧"));
  }
  chatWrap.appendChild(chatBox);

  // 表情面板（折叠显示，点击表情按钮展开）
  const emojiPanel = el("div", { class: "emoji-panel hidden" });
  CHAT_EMOJIS.forEach((emo) => {
    const btn = el("span", { class: "emoji-btn" }, emo);
    btn.addEventListener("click", () => {
      input.value += emo;
      emojiPanel.classList.add("hidden");
      input.focus();
    });
    emojiPanel.appendChild(btn);
  });
  chatWrap.appendChild(emojiPanel);

  const inputRow = el("div", { class: "row", style: "margin-top:8px; gap:4px;" });
  const input = el("input", { class: "input", placeholder: "说点什么…", maxlength: "200", style: "flex:1;" });

  const emojiToggleBtn = el("button", { class: "btn", style: "padding:6px 8px; white-space:nowrap;" }, "😀");
  emojiToggleBtn.addEventListener("click", () => emojiPanel.classList.toggle("hidden"));

  const imageInput = el("input", { type: "file", accept: "image/jpeg,image/png,image/gif,image/webp", style: "display:none;" });
  const imageBtn = el("button", { class: "btn", style: "padding:6px 8px; white-space:nowrap;" }, "🖼️");
  imageBtn.addEventListener("click", () => imageInput.click());
  imageInput.addEventListener("change", () => {
    const file = imageInput.files[0];
    if (file) uploadAndSendChatImage(file);
    imageInput.value = "";
  });

  const sendBtn = el("button", { class: "btn btn-primary", style: "white-space:nowrap;" }, "发送");
  const doSend = () => {
    const text = input.value.trim();
    if (!text) return;
    sendAction("sendChat", { text });
    input.value = "";
  };
  sendBtn.addEventListener("click", doSend);
  input.addEventListener("keydown", (e) => { if (e.key === "Enter") doSend(); });
  inputRow.appendChild(emojiToggleBtn);
  inputRow.appendChild(imageBtn);
  inputRow.appendChild(imageInput);
  inputRow.appendChild(input);
  inputRow.appendChild(sendBtn);
  chatWrap.appendChild(inputRow);

  // 自动滚动到底部，方便看到最新消息
  setTimeout(() => { chatBox.scrollTop = chatBox.scrollHeight; }, 0);

  return chatWrap;
}

// ---------- 建房弹窗 ----------
function openBuildModal(state) {
  const me = state.players.find((p) => p.id === App.playerId);
  const isArchitect = me && me.jobId === "architect";
  const myTiles = BOARD.filter((t) => t.type === "property" && state.properties[t.id]?.ownerId === App.playerId);

  const overlay = el("div", { class: "modal-overlay", onclick: (e) => { if (e.target === overlay) overlay.remove(); } });
  const modal = el("div", { class: "modal-box card" });
  modal.appendChild(el("div", { style: "font-weight:800; margin-bottom:4px;" }, "建房"));
  modal.appendChild(el("div", { style: "font-size:12px; color:var(--ink-soft); margin-bottom:12px;" }, "拥有地产即可建房，无需集齐整组；建房后需保留至少 $500 现金"));

  if (myTiles.length === 0) {
    modal.appendChild(el("div", { style: "text-align:center; color:var(--ink-soft); padding:20px 0;" }, "你还没有可建房的地产"));
  }

  myTiles.forEach((tile) => {
    const pState = state.properties[tile.id];
    const baseCost = tile.houseCost || 50;
    const cost = isArchitect ? Math.floor(baseCost * 0.8) : baseCost;
    const costLabel = isArchitect ? `$${cost}（建筑师折扣，原价$${baseCost}）` : `$${cost}`;
    const canAfford = me.cash - cost >= 500;
    const isFull = pState.houses >= 5;

    const row = el("div", { class: "row-between", style: "padding:8px 0; border-bottom:2px solid var(--panel-border);" }, [
      el("div", {}, [
        el("div", { style: "font-weight:700;" }, tile.name),
        el("div", { style: "font-size:12px; color:var(--ink-soft);" }, `房屋: ${pState.houses}/5  造价: ${costLabel}`),
        !canAfford && !isFull ? el("div", { style: "font-size:11px; color:var(--danger);" }, "现金不足安全垫，无法建造") : null,
      ]),
      el("button", {
        class: "btn btn-primary",
        style: "padding:8px 14px; font-size:13px;",
        onclick: () => { sendAction("buildHouse", { tileId: tile.id }); overlay.remove(); },
      }, "+建造"),
    ]);
    if (isFull || !canAfford) {
      row.querySelector("button").disabled = true;
    }
    modal.appendChild(row);
  });

  modal.appendChild(el("button", { class: "btn btn-block", style: "margin-top:14px;", onclick: () => overlay.remove() }, "关闭"));
  overlay.appendChild(modal);
  document.body.appendChild(overlay);
}

  resultCard.appendChild(el("div", { style: "font-size:15px; font-weight:800; text-align:center; margin-bottom:14px;" },
    winner ? `${winner.name} 获胜！` : "游戏结束"
  ));

  const ranking = [...state.players].sort((a, b) => b.cash - a.cash);
  resultCard.appendChild(el("div", { style: "margin-bottom:14px;" },
    ranking.map((p, i) => {
      const ownedCount = Object.values(state.properties).filter((ps) => ps.ownerId === p.id).length;
      const avatarWrap = el("span", { style: "display:inline-flex; width:22px; height:22px; border-radius:50%; overflow:hidden; border:2px solid var(--ink); flex-shrink:0; margin-right:6px; vertical-align:middle;" });
      avatarWrap.innerHTML = renderPixelAvatar(p, 22);
      return el("div", { class: "row-between", style: "padding:6px 0; border-bottom:1px dashed var(--panel-border);" }, [
        el("span", { class: "row", style: "gap:4px;" }, [avatarWrap, `${i + 1}. ${p.name}`]),
        el("span", { style: "font-size:12px; color:var(--ink-soft);" }, `${ownedCount}块地产`),
        el("span", { style: "font-weight:700;" }, p.bankrupt ? "💥 破产" : `$${p.cash}`),
      ]);
    })
  ));

  resultCard.appendChild(el("button", { class: "btn btn-primary btn-block", onclick: () => {
    clearSession();
    App.roomId = null;
    if (App.ws) App.ws.close();
    App.screen = "home";
    render();
  }}, "返回首页"));

  wrap.appendChild(resultCard);
  wrap.appendChild(buildLogChatPanel(state));

  container.appendChild(wrap);
}

// ---------- 主渲染调度 ----------
function render() {
  const app = $("#app");

  // 游戏进行中：复用已存在的棋盘容器，只做增量更新，保证棋子滑动动画生效
  if (App.screen === "room" && App.gameState && App.gameState.phase === "playing") {
    const existingBoardArea = document.getElementById("board-area-root");
    if (existingBoardArea) {
      updateGamePlayingIncremental();
      return;
    }
  }

  app.innerHTML = "";

  if (App.screen === "room" && App.gameState) {
    const autoPilotBtn = App.gameState.phase === "playing" ? el("button", {
      class: "btn" + (App.autoPilot ? " btn-primary" : ""),
      style: "padding:6px 9px; font-size:11px;",
    }, App.autoPilot ? "🤖 托管中" : "🤖 托管") : null;
    if (autoPilotBtn) {
      autoPilotBtn.addEventListener("click", () => {
        App.autoPilot = !App.autoPilot;
        autoPilotBtn.classList.toggle("btn-primary", App.autoPilot);
        autoPilotBtn.textContent = App.autoPilot ? "🤖 托管中" : "🤖 托管";
        showToast(App.autoPilot ? "已开启自动托管" : "已关闭自动托管");
        if (App.autoPilot) maybeAutoPilot(App.gameState); // 开启时立刻检查一次，避免错过当前回合
      });
    }

    const soundBtn = el("button", {
      class: "btn",
      style: "padding:6px 9px; font-size:11px;",
    }, App.soundEnabled ? "🔊" : "🔇");
    soundBtn.addEventListener("click", () => {
      App.soundEnabled = !App.soundEnabled;
      soundBtn.textContent = App.soundEnabled ? "🔊" : "🔇";
    });

    const top = el("div", { class: "topbar" }, [
      el("div", { class: "topbar-title" }, [
        el("span", { class: "conn-dot" + (App.connected ? "" : " offline") }),
        `房间 ${App.roomId}`,
      ]),
      el("div", { class: "row", style: "gap:6px;" }, [
        autoPilotBtn,
        soundBtn,
        el("button", { class: "btn", style: "padding:6px 10px; font-size:12px;", onclick: () => {
          if (confirm("确定退出房间吗？退出后可凭房间号重新加入。")) {
            clearSession();
            App.roomId = null;
            if (App.ws) App.ws.close();
            App.screen = "home";
            render();
          }
        }}, "退出"),
      ]),
    ]);
    app.appendChild(top);

    const body = el("div", { style: "flex:1; overflow-y:auto; display:flex; flex-direction:column;" });
    app.appendChild(body);

    if (App.gameState.phase === "waiting") {
      renderWaitingRoom(body);
    } else if (App.gameState.phase === "selectingJob") {
      renderJobBoxSelection(body);
    } else if (App.gameState.phase === "playing") {
      renderGamePlaying(body);
    } else if (App.gameState.phase === "ended") {
      renderGameEnded(body);
    }
    return;
  }

  if (App.screen === "create") return renderCreate(app);
  if (App.screen === "join") return renderJoin(app);
  renderHome(app);
}

// 游戏进行中的增量更新：只替换玩家条/操作面板/日志，棋盘格子整体刷新（变化不频繁），
// 但棋子层做"移动现有元素"而非"重建"，从而让 CSS transition 动画生效
function updateGamePlayingIncremental() {
  const state = App.gameState;

  // 1. 更新棋盘格子内容（所有权染色、房屋数等）—— 格子本身重建不影响棋子动画，因为棋子在独立层。
  //    注：renderBoard() 会连带生成全新的 centerOverlay（含动态/聊天面板），但这里只取 .board-grid 部分使用，
  //    centerOverlay 由第4步单独、更精细地处理（保留聊天输入框焦点），避免被这里的整体重建打断。
  const oldBoardGrid = document.querySelector("#board-area-root .board-grid");
  if (oldBoardGrid) {
    const newBoardArea = renderBoard(state);
    const newGrid = newBoardArea.querySelector(".board-grid");
    oldBoardGrid.replaceWith(newGrid);
  }

  // 2. 棋子层：增量移动已存在的棋子元素到新位置（触发transition），新玩家则新建
  const tokenLayer = document.getElementById("token-layer");
  if (tokenLayer) {
    updateTokenPositions(state, tokenLayer);
  }

  // 3. 顶部玩家资产条、操作面板、日志：直接重建（变化频繁但本身不需要动画）
  const playerStripOld = document.querySelector(".player-strip");
  if (playerStripOld) {
    const newStrip = buildPlayerStrip(state);
    playerStripOld.replaceWith(newStrip);
  }

  const turnBannerOld = document.querySelector(".turn-banner");
  if (turnBannerOld) {
    const newBanner = buildTurnBanner(state);
    turnBannerOld.replaceWith(newBanner);
  }

  const actionPanelOld = document.querySelector(".action-panel");
  if (actionPanelOld) {
    const newPanel = buildActionPanel(state);
    actionPanelOld.replaceWith(newPanel);
  }

  const logChatOld = document.querySelector(".log-chat-panel");
  if (logChatOld) {
    // 保留聊天输入框当前内容和焦点，避免别人操作触发的广播打断正在打字的玩家
    const oldInput = logChatOld.querySelector("input.input");
    const hadFocus = oldInput && document.activeElement === oldInput;
    const oldValue = oldInput ? oldInput.value : "";

    const newPanel = buildLogChatPanel(state);
    logChatOld.replaceWith(newPanel);

    if (oldValue) {
      const newInput = newPanel.querySelector("input.input");
      if (newInput) {
        newInput.value = oldValue;
        if (hadFocus) newInput.focus();
      }
    }
  }

  // 5. 镜头跟随：棋盘格子内容刚被替换（第1步），此时再应用一次镜头变换，确保位置更新后镜头跟着对齐
  applyCameraTransform();
}

// 增量移动棋子：已存在的token元素只更新left/top（触发CSS transition滑动），不存在则新建
// 落地高亮：玩家走到某地块时，克隆该格子内容并以放大态悬浮显示在棋盘最上层，原格子不受影响（避免被overflow:hidden裁切）
function highlightLandedTile(tileId) {
  const tileEl = document.querySelector(`.tile[data-tile-id="${tileId}"]`);
  const tokenLayer = document.getElementById("token-layer");
  if (!tileEl || !tokenLayer) return;

  // 清理上一次可能还存在的高亮悬浮层，避免连续落地时叠加残留
  const existing = document.getElementById("tile-highlight-popup");
  if (existing) existing.remove();

  const rect = tileEl.getBoundingClientRect();
  const layerRect = tokenLayer.getBoundingClientRect();
  if (!layerRect.width || !layerRect.height) return;

  // 计算该格子在 token-layer 坐标系（百分比）下的位置和尺寸
  const leftPct = ((rect.left - layerRect.left) / layerRect.width) * 100;
  const topPct = ((rect.top - layerRect.top) / layerRect.height) * 100;
  const widthPct = (rect.width / layerRect.width) * 100;
  const heightPct = (rect.height / layerRect.height) * 100;

  const popup = el("div", {
    id: "tile-highlight-popup",
    style: `position:absolute; left:${leftPct}%; top:${topPct}%; width:${widthPct}%; height:${heightPct}%; z-index:30; pointer-events:none; transform-origin:center center;`,
  });
  popup.innerHTML = tileEl.innerHTML;
  popup.className = tileEl.className + " tile-highlight-popup";
  tokenLayer.appendChild(popup);

  requestAnimationFrame(() => popup.classList.add("tile-landed-highlight"));

  setTimeout(() => popup.remove(), 1400);
}

function updateTokenPositions(state, layer) {
  const alivePlayers = state.players.filter((p) => !p.bankrupt);
  const tilePlayers = {};
  alivePlayers.forEach((p) => {
    tilePlayers[p.position] = tilePlayers[p.position] || [];
    tilePlayers[p.position].push(p);
  });

  const seenIds = new Set();

  Object.entries(tilePlayers).forEach(([tileId, players]) => {
    const { leftPct, topPct } = getTileCenterPercent(Number(tileId));
    const n = players.length;
    players.forEach((p, idx) => {
      seenIds.add(p.id);
      const offsetAngle = (idx / Math.max(n, 1)) * 2 * Math.PI;
      const offsetRadius = n > 1 ? 2.2 : 0;
      const left = leftPct + Math.cos(offsetAngle) * offsetRadius;
      const top = topPct + Math.sin(offsetAngle) * offsetRadius;

      let tokenEl = document.getElementById(`token-${p.id}`);
      if (tokenEl) {
        // 如果这个玩家的棋子正在播放分步走路动画，跳过本次位置更新，让动画函数控制棋子位置
        if (WalkAnimationLocks.has(p.id)) {
          // 动画运行中，不覆盖位置
        } else {
          // 已存在：只改变位置触发 transition 动画
          const movedDistance = Math.abs(parseFloat(tokenEl.style.left) - left) + Math.abs(parseFloat(tokenEl.style.top) - top);
          tokenEl.style.left = `${left}%`;
          tokenEl.style.top = `${top}%`;
          if (movedDistance > 0.5) {
            tokenEl.classList.remove("token-bounce");
            requestAnimationFrame(() => tokenEl.classList.add("token-bounce"));
            highlightLandedTile(Number(tileId));
          }
        }
      } else {
        // 新建（首次出现，如刚加入游戏）
        tokenEl = el("div", {
          id: `token-${p.id}`,
          class: "token-moving",
          style: `left:${left}%; top:${top}%;`,
          title: p.name,
        });
        tokenEl.innerHTML = renderPixelAvatar(p, TOKEN_DISPLAY_SIZE, WalkAnimation.frame);
        layer.appendChild(tokenEl);
      }
    });
  });

  // 清理已破产/已离场玩家的棋子元素
  layer.querySelectorAll(".token-moving").forEach((el) => {
    const pid = el.id.replace("token-", "");
    if (!seenIds.has(pid)) el.remove();
  });
}

// ---------- 初始化 ----------
function init() {
  // 处理分享链接中的房间号参数
  const urlParams = new URLSearchParams(location.search);
  const roomFromUrl = urlParams.get("room");

  if (roomFromUrl) {
    App.screen = "join";
    render();
    setTimeout(() => {
      const roomInput = document.querySelector('input[placeholder="房间号（4位）"]');
      if (roomInput) roomInput.value = roomFromUrl.toUpperCase();
    }, 0);
    return;
  }

  render();

  // 注册 Service Worker（独立 sw.js 文件，与本页面同源部署；详见部署说明）
  // 注：浏览器禁止用 Blob/跨域 URL 注册 Service Worker，必须是同源的真实文件，
  // 所以本项目附带一个独立的 sw.js，部署时把它和 index.html 放在同一目录即可。
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js").catch(() => {
      // 找不到 sw.js 不影响游戏功能，只是没有离线外壳缓存
    });
  }
}

init();

</script>
